  # Layout translations
  text.previous_residence_and_travel: "2.)	கடந்த 5 ஆண்டுகளில் (4 வாரங்களுக்கும் குறைவான விடுமுறை நாட்கள் நீங்களாக) உங்கள் முன்னைய வதிவிடம் மற்றும் பயண விபரங்களை வழங்கவும்:"
  text.future_residence_and_travel: "3.)	அடுத்த 5 ஆண்டுகளுக்கு (4 வாரங்களுக்கும் குறைவான விடுமுறை நாட்கள் நீங்களாக) உங்கள் எதிர்கால வதிவிடம் மற்றும் பயண நோக்கங்களின் விபரங்களை வழங்கவும்:"
  text.declaration: "நான் அளித்த பதில்கள் எனக்குத் தெரிந்தவரை சரியானவையும் உண்மையானவையுமாகும் என்றும், இந்த விண்ணப்பத்தின் மதிப்பீடு அல்லது ஏற்றுக்கொள்ளலைப் பாதிக்கக்கூடிய எந்தவொரு முக்கிய தகவலையும் நான் மறைக்கவில்லை என்றும் நான் வெளிப்படுத்துகிறேன்."
  text.agreement: "இந்த விண்ணப்பம் எனது காப்புறுதித் திட்டத்தின் ஒரு பகுதியாக இருக்கும் என்பதையும், எனக்குத் தெரிந்த எந்தவொரு முக்கிய உண்மைகளையும் வெளியிடத் தவறினால் ஒப்பந்தம் செல்லுபடியற்றதாகிவிடும் என்பதையும் நான் ஏற்றுக்கொள்கிறேன்."
  submit.button: "Submit Form"
