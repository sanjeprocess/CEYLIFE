  # Layout translations
  text.previous_residence_and_travel: "2.)	කරුණාකර, ඔබගේ පසුගිය පදිංචිය පිළිබඳ තොරතුරු සහ පසුගිය වසර 5 තුළ ඔබගේ සංචාර (සති 4ට අඩු සංචාර වල හැරෙන්නට) පිළිබඳ තොරතුරු සපයන්න:"
  text.future_residence_and_travel: "3.) කරුණාකර, ඔබගේ අනාගත පදිංචිය සහ ඉදිරි වසර 5 සඳහා අපේක්ෂිත සංචාර (සති 4ට අඩු සංචාර වල හැරෙන්නට) පිළිබඳ තොරතුරු සපයන්න. "
  text.declaration: "මා විසින් දී ඇති පිළිතුරු මාගේ උපරිම දැනීමේ හැටියට සත්‍ය හා නිවැරදි බවත්, මෙම අයදුම්පත තක්සේරු කිරීම හෝ පිළිගැනීම සම්බන්ධයෙන් බලපෑ හැකි කිසිදු වැදගත් තොරතුරක් මා විසින් රඳවා නොගත් බවත් මම ප්‍රකාශ කරමි."
  text.agreement: "රක්ෂණය සඳහා වන මාගේ අයදුම්පතෙහි කොටසක් මෙම පෝරමය මගින් නිර්මාණය කෙරෙන බවට මම පිළිගන්නා අතර, මා විසින් දැන සිටින කිසියම් වැදගත් තොරතුරක් හෙළිදරව් කිරීමට මම අපොහොසත් වුවහොත් ඒ හේතුවෙන් මෙම ගිවිසුම අවලංගු විය හැකි බවට මම එකඟ වෙමි. "
  submit.button: "Submit Form"
  reset.button: "Reset Form"


