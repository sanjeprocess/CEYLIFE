  date.label: "Date"

  # Layout translations
  text.previous_residence_and_travel: "2.)Please provide details of your previous residence and travel during the last 5 years (excluding holidays of less than 4 weeks )"
  text.future_residence_and_travel: "3.) Please provide details of your future residence and travel intentions during the next 5 years (excluding holidays of less than 4 weeks )"
