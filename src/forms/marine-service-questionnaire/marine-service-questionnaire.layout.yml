# marine-service-questionnaire form layout

- field: ProposerName
- field: proposalNum
- h1: Marine Service Questionnaire
  key: h1.title
  align: center
- field: vesselName
- field: vesselOwner
- field: vesselLine
- field: motivePower
- field: vesselBusiness
- field: businessPly
- field: ports
- field: vesselType
- field: tropicalPorts
- field: position
- field: serviceYears
- field: insurable
- card: ""
  key: card.declare
  items:
    - text: <b>I declare that the answers I have given are to the best of my knowledge
        true and that I have not withheld any material information that may
        influence the assessment or acceptance of the proposal.</b>
      key: text.declare
    - text: <b>I agree that this form will constitute part of my proposal for life
        assurance and that failure to disclose any material fact known to me may
        invalidate the contract.</b>
      key: text.agree
- row: 2
  columns:
    - field: date
    - field: signature
- row: 12
  columns:
    - submit: Submit Form
      key: submit.button
      align: center
      margin: 30px 0 0 0
      variant: default
    - reset: Reset Form
      key: reset.button
      align: center
      margin: 30px 0 0 0
      variant: outline
