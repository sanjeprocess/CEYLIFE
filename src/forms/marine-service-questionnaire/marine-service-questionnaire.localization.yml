  text.declare: "<b>ඉහත සපයා ඇති ප්‍රශ්ණ වලට මා විසින් සපයන ලද පිළිතුරු සත්‍ය බව ප්‍රකාශ කරමි. තවද, මෙම ආකෘති පත්‍රය මා විසින් සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් වෙත ඉදිරිපත් කළ ජීවිත රක්ෂණ යෝජනා පත්‍රයේම කොටසක් බවත්, කිසියම් වටිනා තොරතුරක් වසන් කිරීමෙන් එම ගිවිසුම අහෝසි වන බවත්, මා දන්නා බව ප්‍රකාශ කරමි.</b>"
