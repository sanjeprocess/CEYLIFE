# marine-service-questionnaire form fields

ProposerName:
  type: text
  label: Proposer's Name
  required: true
  placeholder: Proposer's Name
  defaultValue: "{{proposers_name}}"
proposalNum:
  type: number
  label: Proposal Number
  required: true
  placeholder: Proposal Number
  defaultValue: "{{proposal_number}}"
vesselName:
  type: text
  label: 1) a) What is the name of the Vessel?
  required: true
  placeholder: Vessel Name
  defaultValue: ""
vesselOwner:
  type: text
  label: b) Who are its owners?
  required: true
  placeholder: Vessel Owner
  defaultValue: ""
vesselLine:
  type: text
  label: c) To what line does it belong?
  required: true
  placeholder: Vessel Line
  defaultValue: ""
motivePower:
  type: text
  label: 2) What is its motive power, rating and gross tonnage?
  required: true
  placeholder: Enter Motive Power ,rating and gross tonnage
  defaultValue: ""
vesselBusiness:
  type: text
  label: 3) In what business is it engaged?
  required: true
  placeholder: Enter  Business type
  defaultValue: ""
businessPly:
  type: text
  label: 4) In what waters does it ply?
  required: true
  placeholder: Enter  waters
  defaultValue: ""
ports:
  type: text
  label: 5) Between what ports?
  required: true
  placeholder: Enter  ports
  defaultValue: ""
vesselType:
  type: radio-group
  label: 6) What is the type of the vessel?
  required: true
  options:
    barge_boat: Is the boat a barge
    tug_boat: Tug Boat
    launch_first: Launch First - class passenger steamship
    freight_steamship: Freight steamship
    sailing_vessel: Sailing vessel
tropicalPorts:
  type: text
  label: 7) Which tropical ports will the ship call at?
  required: true
position:
  type: text
  label: 8) What is the title of your position?
  required: true
  placeholder: Enter  position
  defaultValue: ""
serviceYears:
  type: text
  label: 9) How long have you been engaged in a sea-faring occupation?
  required: true
  placeholder: Enter  years
  defaultValue: ""
insurable:
  type: radio-group
  label: 10) Is the vessel seaworthy and insurable?
  required: true
  options:
    yes: Yes
    no: No
  orientation: horizontal
  dependencies:
    Details:
      type: textarea
      label: If so, is the vessel now insured?
      placeholder: Enter insurance status.
      defaultValue: ""
      conditionalOptions:
        operator: eq
        value: yes
date:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
signature:
  type: file
  label: Signature
  required: false
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - .png
      - .jpg
      - .jpeg
      - .pdf
