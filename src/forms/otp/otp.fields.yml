# otp form fields

clientName:
  type: text
  label: Client Name
  required: true
  placeholder: Auto-filled after OTP verification
  description: Your name as per our records
  defaultValue: "{{client_name}}"
contractNumber:
  type: text
  label: Contract Number
  required: true
  placeholder: Auto-filled after OTP verification
  description: Your contract number
  defaultValue: "{{contract_number}}"
clouReference:
  type: text
  label: CLOU Reference Number
  required: true
  placeholder: Auto-filled after OTP verification
  description: CLOU reference number
  defaultValue: "{{clou_reference}}"
clientEmail:
  type: email
  label: Email Address
  required: false
  placeholder: Auto-filled after OTP verification
  description: Your email address
  defaultValue: "{{client_email}}"
clientNumber:
  type: text
  label: Client Number
  required: false
  placeholder: Auto-filled after OTP verification
  description: Your client number
  defaultValue: "{{client_number}}"
contactNo1:
  type: tel
  label: Primary Contact Number
  required: false
  placeholder: Auto-filled after OTP verification
  description: Your primary contact number
  defaultValue: "{{contact_1}}"
contactNo2:
  type: tel
  label: Secondary Contact Number
  required: false
  placeholder: Auto-filled after OTP verification
  description: Your secondary contact number
  defaultValue: "{{contact_2}}"
requestType:
  type: text
  label: Request Type
  required: false
  placeholder: Auto-filled after OTP verification
  description: Type of request
  defaultValue: "{{request_type}}"
questionnaireType:
  type: text
  label: Questionnaire Type
  required: false
  placeholder: Auto-filled after OTP verification
  description: Questionnaire type
  defaultValue: "{{questionnaire_type}}"
preferredLanguage:
  type: text
  label: Preferred Language
  required: false
  placeholder: Auto-filled after OTP verification
  description: Your preferred language
  defaultValue: "{{preferred_language}}"
submissionDate:
  type: datetime-local
  label: Submission Date & Time
  required: false
  placeholder: Current date and time
  description: Date and time of submission
  defaultValue: "{{$now}}"
termsAccepted:
  type: checkbox
  label: I accept the terms and conditions
  required: true
  description: Please check to proceed
  checked: false
marketingConsent:
  type: checkbox
  label: I consent to receive marketing communications
  required: false
  description: Optional marketing consent
  checked: false
preferences:
  type: checkbox-group
  label: Communication Preferences
  required: false
  description: Select your preferred communication methods
  options:
    email: Email
    sms: SMS
    phone: Phone Call
    mail: Postal Mail
age:
  type: number
  label: Age
  required: false
  placeholder: Enter your age
  description: Your age in years
  validation:
    min: 0
    max: 100
amount:
  type: number
  label: Requested Amount
  required: false
  placeholder: 0.00
  description: Amount in local currency
  validation:
    min: 0
    max: 1000000
priority:
  type: number
  label: Priority Level
  required: false
  placeholder: 1-10
  description: Priority level (1 = low, 10 = high)
  validation:
    min: 1
    max: 10
tags:
  type: text
  label: Tags
  required: false
  placeholder: tag1, tag2, tag3
  description: Comma-separated tags for categorization
categories:
  type: checkbox-group
  label: Request Categories
  required: false
  description: Select applicable categories
  options:
    urgent: Urgent
    standard: Standard
    followup: Follow-up Required
    documentation: Documentation
    verification: Verification
streetAddress:
  type: text
  label: Street Address
  required: false
  placeholder: 123 Main Street
  description: Your street address
city:
  type: text
  label: City
  required: false
  placeholder: Colombo
  description: Your city
postalCode:
  type: text
  label: Postal Code
  required: false
  placeholder: 00100
  description: Your postal code
status:
  type: select
  label: Request Status
  required: false
  description: Current status of the request
  options:
    pending: Pending
    in_progress: In Progress
    completed: Completed
    cancelled: Cancelled
notes:
  type: textarea
  label: Additional Notes
  required: false
  placeholder: Enter any additional information
  description: Any additional notes or comments
  rows: 4
