  text.declaration: "ඉහත සඳහන් සියලු ප්‍රකාශන හා පිළිතුරු සත්‍ය බවත් කිසිම කරුණක් වසන් නොකළ බවත් මෙයින් ප්‍රකාශ කරමි / කරමු. මෙම පිළිතුරු හා ප්‍රකාශනය රක්ෂණ ගිවිසුමේ කොටසක් බවත් මෙහි අසත්‍ය කරුණක් සඳහන් කර ඇත්නම් මෙම ගිවිසුම අවලංගු හා ශුන්‍ය වන බවත් ප්‍රකාශ කරමි/කරමු"
  text.consent: "පුද්ගලයන් ලියාපදිංචි කිරීමේ දෙපාර්තමේන්තුව වෙතින් මාගේ/අපගේ ජාතික හැඳුනුම්පතේ තොරතුරු පරික්ෂා කිරීමට සෙලින්කෝ ජීවිත රක්ෂණ සමාගමට මෙයින් මාගේ/ අපගේ කැමැත්ත ලබා දෙමි/ දෙමු."
  text.agree: "මම/අප විසින් ඉදිරිපත් කර ඇති මෙම යෝජනා පත්‍රය තක්සේරු කිරීමේදී හා ඒ හා සම්බන්ධ රක්ෂණාවරණ හා අනෙකුත් සේවා සැපයීමට අදාළ අවශ්‍යතාවන් වෙනුවෙන් මාගේ/අපගේ පුද්ගලික තොරතුරු ලබා ගැනීමට, භාවිත කිරීමට හෝ හෙළිකිරීමට සෙලින්කෝ ලයිෆ් රක්ෂණ සමාගමට, ඔවුන්ගේ නියෝජිතයන්ට හා ශ්‍රී ලංකාව තුළ හෝ පිටත සිටින එකී සේවා සැපයීමට බලයලත් ආයතන වෙත මෙයින් අවසරය දෙමි/දෙමු."
