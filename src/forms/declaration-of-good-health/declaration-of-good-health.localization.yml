  # Health Questions
  healthQ1.label: "2.1.	நீங்கள் நீரிழிவு, இதய நோய், உயர் குருதி அமுக்கம், உயர் கொலஸ்ரோல், சிறுநீரக நோய், சுவாச தொகுதி நோய், ஈரல் நோய், பக்கவாதம், புற்று நோய் என்பவற்றால் பாதிக்கப்பட்டுள்ளீரா அல்லது தற்போது பாதிக்கப்படுகிறீரா?   "
  healthQ1.options.Yes: "ஆம் "
  healthQ1.options.No: "இல்லை"
  healthQ1Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ2.label: "2.2.	நீங்கள் வேறு ஏதாவது நோயினால் பாதிக்கப்பட்டுள்ளீரா அல்லது தற்சமயம் பாதிக்கப்படுகிறீரா அல்லது ஏதாவது மருத்துவ பரிசோதனை அல்லது அறுவைச் சிகிச்சைக்கு உட்பட்டுள்ளீரா?"
  healthQ2.options.Yes: "ஆம்"
  healthQ2.options.No: "இல்லை"
  healthQ2Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ3.label: "2.3.	கடந்த 05 வருடங்களிற்குள்ளாக நீங்கள் வழமையான மருத்துவ பரிசோதனைகள் மற்றும் இரத்த பரிசோதனை என்பவை உட்பட ஒரு மருத்துவரை ஏதாவது காரணத்திற்காக கலந்தாலோசித்துள்ளீரா?"
  healthQ3.options.Yes: "ஆம்"
  healthQ3.options.No: "இல்லை"
  healthQ3Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ4.label: "2.4.	நீங்கள் ஏதாவது மனநலக் குறைபாட்டினால் அல்லது உடல் நலக்குறைபாட்டினால் பாதிக்கப்பட்டுள்ளீரா?"
  healthQ4.options.Yes: "ஆம்"
  healthQ4.options.No: "இல்லை"
  healthQ4Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ5.label: "2.5.	நீங்கள் COVID – 19 தொற்று அல்லது அதன் சிக்கல்களுக்காக எப்போதாவது மருத்துவமனையில் அனுமதிக்கப்பட்டுள்ளீரா அல்லது COVID – 19 தொற்றுடன் தொடர்புடைய சிக்கல் நிலைமைகளை தற்பொழுதும் கொண்டுள்ளீரா?"
  healthQ5.options.Yes: "ஆம்"
  healthQ5.options.No: "இல்லை"
  healthQ5Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ6.label: "2.6.	நீங்கள் ஒரு அரசியல் ஆபத்துக்களை எதிர்கொள்ளும் (Politically Exposed Person (*PEP) நபரா அல்லது அவர்களுடன் தொடர்புடையவரா? 	(*PEP – அரசியல்வாதிகள், சிரேஷ்ட அரசாங்க உத்தியோகத்தர்கள், நீதிபதிகள் மற்றும் நீதித்துறை உத்தியோகத்தர்கள், இராணுவ / பொலிஸ்படைகளின் உயர் அதிகாரிகள், ஆணைக்குழுக்களின் / பணிப்பாளர்கள் / பல்கலைக்கழக ஆலோசனை சபை, பணிப்பாளர் சபை என்பவற்றின் உறுப்பினர்கள் மற்றும் சர்வதேச நிறுவனங்களின் அதிகாரிகள்)"
  healthQ6.options.Yes: "ஆம்"
  healthQ6.options.No: "இல்லை"
  healthQ6Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ7.label: "2.7.	நீங்கள் மது / போதைவஸ்து என்பவற்றை பாவிப்பவரா அல்லது புகைபிடிப்பவரா? ('ஆம்' எனில் பாவிக்கும் அளவையும் தடவையையும் குறிப்பிடுக)"
  healthQ7.options.Yes: "ஆம்"
  healthQ7.options.No: "இல்லை"
  liquorUsage.label: "உட்கொள்ளும் ஆல்கஹால் அளவு"
  smokeUsage.label: "புகைபிடிக்கும் அளவு"
  drugsUsage.label: "மருந்து உபயோகத்தின் அளவு"

  healthQ8.label: "2.8.	நீங்கள் அல்லது உங்கள் உறவினர்கள் ஏதாவது வகையான உயிர் அச்சுறுத்தலை கொண்டிருந்தீர்களா அல்லது கொண்டுள்ளீர்களா அல்லது உங்களுக்கு எதிராக ஏதாவது குற்றவியல் வழக்குகள் உள்ளனவா?"
  healthQ8.options.Yes: "ஆம்"
