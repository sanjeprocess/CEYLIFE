  # Layout Keys
  h1.personal_information: "பிரத்தியேகத் தகவல்கள் "
  card.declaration: "வெளிப்படுத்துகை"
  text.declaration: "நான் / நாம் மேலே என்னால் /  எம்மால் தரப்பட்ட கூற்றுக்கள் மற்றும் விடைகள் உண்மையெனவும் நான் / நாம் எந்தவொரு தகவலையும் மறைக்கவில்லை என்பதையும் வெளிப்படுத்துகின்றோம். இந்த கூற்றுக்களும் மற்றும் இந்த வெளிப்படுத்துகையும் காப்புறுதி ஒப்பந்தத்தின் ஒரு பாகமாகும் என்பதை நான் / நாம் ஏற்றுக் கொள்வதுடன் ஏதாவது உண்மையற்ற கூற்றுக்கள் உள்ளடக்கப்பட்டிருப்பின் இங்கு சொல்லப்பட்ட ஒப்பந்தம் வெற்று வெறிதாகும் என்பதையும் ஏற்றுக் கொள்கின்றோம்."
  text.consent: "ஆட்பதிவு திணைக்களத்திலிருந்து எனது / எமது தேசிய அடையாள அட்டை விபரங்களை சரிபார்க்க (நிகழ்நிலை / நேரடியாக) செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் கம்பனிக்கு எனது / எமது சம்மதத்தை வழங்குகின்றோம்"
  text.agree: "நான் / நாம் விண்ணப்பித்திருக்கும் திட்டங்கள் மற்றும் சேவைகளை வழங்குவதற்காக நான் / நாம் விண்ணப்பித்துள்ள பிரேரணையில் உள்ள எனது / எமது தனிப்பட்ட தகவல்களை பொருத்தமான காரணங்களிற்காக இலங்கைக்குள் அல்லது இலங்கைக்கு வெளியில் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் கம்பனிக்கு அதன் பிரதிநிதிகளுக்கு, முகவர்களுக்கு, கம்பனியின் அதிகாரமளிக்கப்பட்ட சேவை வழங்குநர்கள் மற்றும் மூன்றாம் தரப்பினர்களுக்கு வெளியிடவும், தகவல்களை சேகரிக்கவும் நான் / நாம் ஏற்றுக் கொள்வதுடன் சம்மதத்தையும் வழங்குகின்றோம்."
