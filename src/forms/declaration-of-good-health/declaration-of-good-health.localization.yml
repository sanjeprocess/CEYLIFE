  healthQ8Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"

  healthQ9.label: "2.9.	பெண்களுக்கு மட்டும் தற்சமயம் கர்ப்பமாக உள்ளீர்களா? அப்படியானால் மகப்பேறு எப்போது"
  healthQ9.options.Yes: "ஆம்"
