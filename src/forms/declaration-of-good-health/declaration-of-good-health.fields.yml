# dgh form fields

policyNumber:
  type: text
  label: 1. Policy Number
  required: true
  placeholder: Enter policy number
  defaultValue: "{{policy_no}}"
  readOnly: true
fullName:
  type: text
  label: 2. Full Name
  required: true
  placeholder: Enter full name
  defaultValue: "{{full_name}}"
  readOnly: true
address:
  type: text
  label: 3. Address
  required: true
  placeholder: Enter address
telephoneNumber:
  type: tel
  label: i. Fixed Line No
  required: false
  placeholder: Enter fixed line number
mobileNumber:
  type: tel
  label: ii. Mobile Number
  required: true
  placeholder: Enter mobile number
emailAddress:
  type: email
  label: 5. Email Address
  required: false
  placeholder: Enter email address
occupation:
  type: text
  label: 6. Occupation/Business/Job Title
  required: true
  placeholder: Enter occupation
natureOfOccupation:
  type: text
  label: 7. Nature of Occupation/Business/Details of other source of income
  required: true
  placeholder: Enter nature of occupation
annualIncome:
  type: currency
  label: 8. Annual Income
  required: true
  placeholder: Enter annual income
applyTo:
  type: radio-group
  label: "I hereby apply to:"
  required: false
  placeholder: Enter apply to
  options:
    revive the above policy under special revival: 1. revive the above policy under special revival
    revive the above policy under Normal revival: 2. revive the above policy under Normal revival
applyToBenifit:
  type: checkbox
  label: Include benefit
  required: false
  dependencies:
    include:
      type: textarea
      label: Include
      required: false
      placeholder: Enter include details
      conditionalOptions:
        operator: eq
        value: "true"

healthQ1:
  type: radio-group
  label: "2.1 Do you suffer or have you suffered from diabetes, heart disease, high blood pressure, elevated cholesterol, kidney disease, respiratory disease, liver disease, stroke, cancer?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ1Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ2:
  type: radio-group
  label: "2.2 Do you suffer or have you suffered from any other disease or undergone any medical investigation or surgery?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ2Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ3:
  type: radio-group
  label: "2.3 Have you consulted a physician for any reason, including routine examination and blood tests during last 5 years"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ3Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ4:
  type: radio-group
  label: "2.4 Do you suffer from any mental impairment or physical deformity?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ4Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ5:
  type: radio-group
  label: "2.5 Have you ever hospitalized for COVID-19 infections or its complications or do you have any ongoing treatment to COVID-19 infection related complications"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ5Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ6:
  type: radio-group
  label: "2.6 Are you a Politically Exposed Person (PEP*) or related to a PEP? (*PEP)-Politicians, Senior Government Officers, Judges and judicial Officers, Commissioned Officers of armed forces / police, Members of Commissions/Director Boards/University Councils, Officers of International Organizations.)"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ6Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ7:
  type: radio-group
  label: "2.7 Do you consume liquor/drugs or smoke cigarettes? (If so, please state the frequency and quantity)"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    liquorUsage:
      type: text
      label: Liquor – quantity/frequency
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"
    smokeUsage:
      type: text
      label: Smoke – quantity/frequency
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"
    drugsUsage:
      type: text
      label: Drugs – quantity/frequency
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ8:
  type: radio-group
  label: "2.8 Do you or your relatives have or had any kind of threat on your/their lives or is there any criminal case against you?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ8Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ9:
  type: radio-group
  label: "2.9 For female lives only: Are you pregnant? If so, when is the confinement?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
    notApplicable: "Not Applicable"
  dependencies:
    confinementDate:
      type: date
      label: Confinement Date
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

healthQ10:
  type: radio-group
  label: "2.10 Had any proposal for life or health assurance ever been declined or postponed or been accepted with any extra premium?"
  required: true
  options:
    Yes: "Yes"
    No: "No"
  dependencies:
    healthQ10Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "Yes"

submittedDate:
  type: date
  label: Submitted Date
  required: true
  defaultValue: "{{$today}}"
  readOnly: true

signature:
  type: file
  label: Signature of the life Assured
  required: true
