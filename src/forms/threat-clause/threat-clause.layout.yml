# threat-clause form layout
# Items: field, h1, h2, h3, h4, h5, h6, text, spacer, divider, card, row, submit, reset


- field: proposerName
- row : 2
  columns: 
    - field: proposerNic
    - field: proposerContract
- spacer: 20


- card: THREAT CLAUSE
  fontSize: 18
  align: center
  items:
    - text: (To be accepted by the proposer)
      align: center
    - text: The Proposer having declared In the Proposal Form that he had been subject to threats to his life, it is hereby declared and agreed that in the event of death, disability, sickness or injury resulting in consequence of such threat, the liability of the Company will be limited to
    - text: 1) A refund of the total premium paid excluding any extra premium (without interest), subject to the deduction of any sums paid hereunder as the cash value of bonuses, advance payments and loans on the Policy together with accrued interest on any such payment.
    - text: Or
      align: center
    - text: 2) Payment of the net Surrender Value of the Basic Policy, whichever shall be the greater, provided that such amount shall not exceed the Death Benefit on the Basic Policy.
    - divider: true
- text: I have read and understood the afore-said clause and hereby give my consent to accept the Life Assurance proposal subject to respective clause. 
- row: 2
  columns: 
    - field: date
    - field: signature
- row: 12
  columns: 
    - submit: Submit
    - reset: Reset






