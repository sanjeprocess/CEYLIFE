- h4: THREAT CLAUSE
  align: center
- text: The Proposer having declared In the Proposal Form that he had been subject to threats to his life, it is hereby declared and agreed that in the event of death, disability, sickness or injury resulting in consequence of such threat, the liability of the Company will be limited to
- text: A refund of the total premium paid excluding any extra premium (without interest), subject to the deduction of any sums paid hereunder as the cash value of bonuses, advance payments and loans on the Policy together with accrued interest on any such payment.
- text: Or
- text: Payment of the net Surrender Value of the Basic Policy, whichever shall be the greater, provided that such amount shall not exceed the Death Benefit on the Basic Policy.
- divider: true
- text:I have read and understood the atore-said clause and hereby give my consent to accept the Life Assurance proposal subject to respective clause. 
