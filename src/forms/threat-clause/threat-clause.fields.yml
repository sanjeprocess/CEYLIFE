# threat-clause form fields
# Types: text, number, email, password, date, time, datetime-local, checkbox, radio-group, checkbox-group, select, textarea, file, url, tel

proposerName:
  type: text
  label: Proposer Name
  required: true
  placeholder: Enter Proposer Name

proposerContract:
  type: tel
  label: Contract Number
  required: true
  placeholder: Enter Contract Number

proposerNic:
  type: text
  label: NIC Number
  required: true
  placeholder: Enter NIC

date:
  type: date
  label: Date
  required: true
  defaultValue: "{{$today}}"

signature:
  type: file
  label: Signature of Life Assured
  required: false
