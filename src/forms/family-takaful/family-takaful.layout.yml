# family-takaful form layout

- card: PARTICIPANT INFORMATION
  key: card.participantInformation
  items:
    - field: certificateNo
    - field: participantName
    - field: address
    - field: revivalType
    - field: benefit

- card: Health/Other details
  key: card.healthOtherDetails
  items:
    - field: healthQ1
    - field: healthQ1Details
    - field: healthQ2
    - field: healthQ2Details
    - field: healthQ3
    - field: healthQ3Details
    - field: healthQ4
    - field: healthQ4Details
    - field: healthQ5
    - field: healthQ5Details
    - field: healthQ6
    - field: healthQ6Details
    - field: healthQ7
    - field: healthQ7Details
    - field: healthQ8
    - field: confinementDate
    - field: healthQ9
    - field: healthQ9Details

- card: DECLARATION
  key: card.declaration_title
  align: center
  items:
    - text: "I declare that the foregoing statements and answers given by me are true and I have not withheld any information. I do hereby agree that this statement and this declaration shall form a part of the contract and if any untrue averment be contained, the said contract will be null and void."
      key: text.declaration

- row: 2
  columns:
    - field: declarationDate
    - field: signature

- spacer: 20
- row: 12
  columns:
    - submit: Submit Form
      key: submit.button
      align: center
      margin: 30px 0 0 0
      variant: default
    - reset: Reset Form
      key: reset.button
      align: center
      margin: 30px 0 0 0
      variant: outline
