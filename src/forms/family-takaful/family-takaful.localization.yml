ta:
  # Field labels
  certificateNo.label: "சான்றிதழ் இலக்கம் "
  participantName.label: "பங்குபற்றுபவர் முழுப்பெயர்"
  address.label: "முகவரி"
  revivalType.label: " நான் இத்தால் கீழ் உள்ளவாறு விண்ணப்பித்துள்ளேன்,"
  revivalType.options.revive the above certificate under special revival: "1. சான்றிதழ் புதுப்பிக்கும் முறை விசேட மீளுயிரூட்டுகை"
  revivalType.options.normal revivall: "2. சாதாரண மீளுயிரூட்டுகை"
  benefit.label: "3. நன்மை"
  include.label: "அடங்கும்"
  healthQ1.label: "01.	நீங்கள் எப்போதாவது நீரிழிவு, இருதயநோய்கள், குருதி அமுக்கம், உயர் கொலஸ்ரோல், சிறுநீரக தொகுதி நோய்கள், சுவாசப்பை நோய்கள், ஈரல் நோய்கள், பாரிசவாதம், புற்றுநோய் என்பவற்றால் பாதிக்கப்பட்டுள்ளீர்களா?"
  healthQ1.options.yes: "ஆம்"
  healthQ1.options.no: "இல்லை"
  healthQ1Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ2.label: "02. Do you suffer or have you suffered from any other disease or undergone any medical investigation or surgery?"
  healthQ2.options.yes: "ஆம்"
  healthQ2.options.no: "இல்லை"
  healthQ2Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ3.label: "03.	கடந்த 5 வருடங்களுக்குள் தொடர் பரிசோதனைகள் / குருதிப் பரிசோதனைகள் அல்லது வேறு காரணங்களுக்காக வைத்திய நிபுணர் ஒருவரின் ஆலோசனையைப் பெற்றுள்ளீர்களா?"
  healthQ3.options.yes: "ஆம்"
  healthQ3.options.no: "இல்லை"
  healthQ3Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ4.label: "04.	நீங்கள் மதுபான வகைகள் / போதைப் பொருட்கள் / சிகரட் / பீடி / சுருட்டு என்பன பாவிக்கின்றீர்களா? (ஆம் எனில் கால இடைவெளியையும் அளவையும் குறிப்பிடுக)"
  healthQ4.options.yes: "ஆம்"
  healthQ4.options.no: "இல்லை"
  healthQ4Details.label: "தயவுசெய்து அதிர்வெண் மற்றும் அளவைக் குறிப்பிடவும்."
  healthQ5.label: "05.	உங்கள் / உறவினரொருவரின் வாழ்க்கை மீது இப்போது / எப்போதாவது அச்சுறுத்தல் உள்ளதா / இருந்துள்ளதா? ஏதாவது குற்றவியல் தவறுக்காக தண்டிக்கப்பட்டுள்ளீர்களா?"
  healthQ5.options.yes: "ஆம்"
  healthQ5.options.no: "இல்லை"
  healthQ5Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ6.label: "06.	உங்கள் ஆயுள் / ஆரோக்கிய காப்புறுதிகள் / தகாஃபுல் பாதுகாப்பு பிரேரணைகள் நிராகரிக்கப்பட்டோ / பிற்போடப்பட்டோ அல்லது மேலதிக கட்டுப்பணத்துடனோ / பங்களிப்புடனோ ஏற்றுக் கொள்ளப்பட்டுள்ளதா?"
  healthQ6.options.yes: "ஆம்"
  healthQ6.options.no: "இல்லை"
  healthQ6Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ7.label: "07.	நீங்கள் ஏதாவது உடல் / மனக் குறைபாடுகளினால் பாதிக்கப்பட்டுள்ளீர்களா?"
  healthQ7.options.yes: "ஆம்"
  healthQ7.options.no: "இல்லை"
  healthQ7Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  healthQ8.label: "08.	பெண்களுக்கு மட்டும்: நீங்கள் தற்போது கர்ப்பமாய் உள்ளீர்களா? அப்படியாயின் பிரசவத் திகதி எப்போது?"
  healthQ8.options.yes: "ஆம்"
  healthQ8.options.no: "இல்லை"
  healthQ9.label: "09.	உங்கள் தொழிலில் ஏதாவது மாற்றங்கள் ஏற்பட்டுள்ளதா?"
  healthQ9.options.yes: "ஆம்"
  healthQ9.options.no: "இல்லை"
  healthQ9Details.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  declarationDate.label: "திகதி"
  signature.label: "பங்குபற்றுபவர் கையொப்பம்"

  # Layout translations
  card.participantInformation: " "
  card.healthOtherDetails: " "
  card.declaration_title: "வெளிப்படுத்துகை"
  text.declaration: "நான் இத்தால் வெளிப்படுத்துவது யாதெனில் மேலே என்னால் அளிக்கப்பட்ட கூற்றுக்களும் விடைகளும் உண்மையானவையாகும். நான் எத்தகவலையும் மறைக்கவில்லை. கூற்றுக்களும் வெளிப்படுத்துகைகளுமே ஒப்பந்தத்தின் அடிப்படையாகும் என்பதை நான் ஏற்றுக்கொள்கிறேன். வெளிப்படுத்தாமை அல்லது பிறழ்கூற்று இவ் ஒப்பந்தத்தை செல்லுபடியற்றதாக்கிவிடும் என்பதை ஏற்றுக் கொள்கிறேன்"
  submit.button: "படிவத்தை நிரப்பவும்"
  reset.button: "படிவத் தரவை நீக்கு"