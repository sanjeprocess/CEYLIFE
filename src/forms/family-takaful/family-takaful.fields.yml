# family-takaful form fields

certificateNo:
  type: text
  label: Certificate No
  required: false
  placeholder: Enter certificate number
  defaultValue: "{{contract_number}}"

participantName:
  type: text
  label: Participant's Full Name
  required: false
  placeholder: Enter full name
  defaultValue: "{{client_name}}"

address:
  type: text
  label: Address
  required: false
  placeholder: Enter address

revivalType:
  type: radio-group
  label: "I hereby apply to"
  required: false
  options:
    revive the above certificate under special revival: 1. Revive the above certificate under special revival
    normal revivall: 2. Normal revival

benefit:
  type: checkbox
  label: 3. benefit
  required: false
  dependencies:
    include:
      type: textarea
      label: Include
      required: false
      placeholder: Enter include details
      conditionalOptions:
        operator: eq
        value: "true"

healthQ1:
  type: radio-group
  label: "01. Do you suffer or have you suffered from diabetes, heart disease, high blood pressure, elevated cholesterol, kidney disease, respiratory disease, liver disease, stroke, cancer?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ1Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ2:
  type: radio-group
  label: "02. Do you suffer or have you suffered from any other disease or undergone any medical investigation or surgery?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ2Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ3:
  type: radio-group
  label: "03. Have you consulted a Physician for any reason, including routine examinations and blood tests during the past 05 years?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ3Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ4:
  type: radio-group
  label: "04. Do you consume liquor/drugs or smoke cigarettes? (if so, please state the frequency and quantity)"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ4Details:
      type: textarea
      label: Please state the frequency and quantity
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ5:
  type: radio-group
  label: "05. Do you or your relatives have or had any kind of threats on your/their lives or is/was there a criminal case made against you?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ5Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ6:
  type: radio-group
  label: "06. Have you had any proposal for life or health assurance/Takaful Cover declined or postponed or accepted with any extra premium/contribution?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ6Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ7:
  type: radio-group
  label: "07. Do you suffer from any mental impairment or physical deformity?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ7Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ8:
  type: radio-group
  label: "08. For female lives only: Are you pregnant? If so, when is the confinement?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    confinementDate:
      type: date
      label: Confinement Date
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ9:
  type: radio-group
  label: "09. Have you changed your occupation?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ9Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

declarationDate:
  type: date
  label: Date
  required: true
  defaultValue: "{{$today}}"

signature:
  type: file
  label: Signature of the participant
  required: false
