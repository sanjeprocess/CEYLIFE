# Section 2: Your Health Condition
21Diabetes:
  type: radio-group
  label: 2.1 Diabetes
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    21Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

22HighBloodPressure:
  type: radio-group
  label: 2.2 High blood pressure(Hypertension)
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    22Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

23ElevatedCholesterol:
  type: radio-group
  label: 2.3 Elevated cholesterol
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    23Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

24CardiovascularSystemDiseaseASDVSD:
  type: radio-group
  label: "2.4 Any Disease of the Cardio Vascular System e.g.: Heart disease, Shortness of breath, Chest pain, Hole in the heart (ASD, VSD)"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    24Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

