  options:
    yes: "Yes"
    no: "No"
  28Details:
    healthQ2_8Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

29AnyDiseasesOfTheGastrointestinalOrDigestiveSystemEGGastricUlcerChronicIndigestionDiarrheaAbdominalPainPilesFistulaRuptureHerniaOrLiverDiseaseJaundiceHepatitisOrGallbladderDiseaseEtc:
  type: radio-group
  label: "2.9 Any diseases of the Gastrointestinal or Digestive system e.g.: Gastric ulcer, Chronic indigestion / Diarrhea / Abdominal pain, Piles Fistula, Rupture, Hernia or Liver disease, Jaundice, Hepatitis or Gallbladder disease, etc."
