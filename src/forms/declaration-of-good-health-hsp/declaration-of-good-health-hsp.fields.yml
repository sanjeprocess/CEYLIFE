# dgh-hsp form fields

policyNo:
  type: text
  label: Policy No
  required: true
  placeholder: Enter policy number
  defaultValue: "{{policy_no}}"

# Section 1: Life Assured
fullName:
  type: text
  label: 1.1 Full Name
  required: true
  placeholder: Enter full name
  defaultValue: "{{client_name}}"

gender:
  type: radio-group
  label: Gender
  required: true
  options:
    male: Male
    female: Female
    other: Other / Prefer not to say

currentAddress:
  type: text
  label: 1.2 Current Address
  required: true
  placeholder: Enter current address

country:
  type: text
  label: Country
  required: true
  placeholder: Enter country

city:
  type: text
  label: City
  required: true
  placeholder: Enter city

emailAddress:
  type: email
  label: Email Address
  required: false
  placeholder: e.g., name@example.com

telephoneFixed:
  type: tel
  label: Telephone - Fixed line
  required: false
  placeholder: Enter telephone number

mobile:
  type: tel
  label: Mobile
  required: true
  placeholder: Enter mobile number

dateOfBirth:
  type: date
  label: 1.3 Date of Birth
  required: true

height:
  type: text
  label: 1.4 Height
  required: true
  placeholder: Enter height

weight:
  type: text
  label: Weight
  required: true
  placeholder: Enter weight

occupation:
  type: text
  label: 1.5 Occupation / Job Title / Business and its Nature
  required: true
  placeholder: Enter occupation/job title/business

employerName:
  type: text
  label: Name of the Employee
  required: true
  placeholder: Enter employer name

annualIncome:
  type: number
  label: 1.6 Annual Income – Rs
  required: true
  placeholder: Enter annual income

# Section 2: Your Health Condition
healthQ2_1:
  type: radio-group
  label: 2.1 Diabetes
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ2_1Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ2_2:
  type: radio-group
  label: 2.2 High blood pressure(Hypertension)
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    healthQ2_2Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

healthQ2_3:
  type: radio-group
  label: 2.3 Elevated cholesterol
  required: true
