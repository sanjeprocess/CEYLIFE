# dgh-hsp form fields

policyNo:
  type: text
  label: Policy No
  required: true
  placeholder: Enter policy number
  defaultValue: "{{policy_no}}"

# Section 1: Life Assured
11FullName:
  type: text
  label: 1.1 Full Name
  required: true
  placeholder: Enter full name
  defaultValue: "{{client_name}}"

gender:
  type: radio-group
  label: Gender
  required: true
  options:
    male: Male
    female: Female
    other: Other / Prefer not to say

12CurrentAddress:
  type: text
  label: 1.2 Current Address
  required: true
  placeholder: Enter current address

country:
  type: text
  label: Country
  required: true
  placeholder: Enter country

city:
  type: text
  label: City
  required: true
  placeholder: Enter city

emailAddress:
  type: email
  label: Email Address
  required: false
  placeholder: e.g., name@example.com

telephoneFixed:
  type: tel
  label: Telephone - Fixed line
  required: false
  placeholder: Enter telephone number

mobile:
  type: tel
  label: Mobile
  required: true
  placeholder: Enter mobile number

13DateOfBirth:
  type: date
  label: 1.3 Date of Birth
  required: true

14Height:
  type: text
  label: 1.4 Height
  required: true
  placeholder: Enter height

weight:
  type: text
  label: Weight
  required: true
  placeholder: Enter weight

15OccupationJobTitleBusinessAndItsNature:
  type: text
  label: 1.5 Occupation / Job Title / Business and its Nature
  required: true
  placeholder: Enter occupation/job title/business

nameOfTheEmployee:
  type: text
  label: Name of the Employee
  required: true
  placeholder: Enter employer name

16AnnualIncome:
  type: number
  label: 1.6 Annual Income – Rs
  required: true
  placeholder: Enter annual income

# Section 2: Your Health Condition
21Diabetes:
  type: radio-group
  label: 2.1 Diabetes
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    21Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

22HighBloodPressure:
  type: radio-group
  label: 2.2 High blood pressure(Hypertension)
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    22Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

23ElevatedCholesterol:
  type: radio-group
  label: 2.3 Elevated cholesterol
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
