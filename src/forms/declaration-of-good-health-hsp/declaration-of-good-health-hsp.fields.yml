# Section 3: Other Information
31HaveYouConsultedAPhysicianSurgeonForAnyReasonIncludingRoutineExaminationOrInvestigationAndBloodTestsInThePast5Years:
  type: radio-group
  label: "3.1 Have you consulted a physician / surgeon for any reason including routine examinations or investigations and blood tests in the past 5 years?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    31Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

32DoYouConsumeLiquordrugsOrSmokeCigarettesifSoPleaseStateTheFrequentlyAndQuantity:
  type: radio-group
  label: "3.2 Do you consume liquor/drugs or smoke cigarettes? (if so, please state the frequency and quantity)"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    32Details:
      type: textarea
      label: Please state the frequency and quantity
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

33HasAnyOfYourProposalForInsuranceEverBeenDeclinedOrPostponedOrBeenAcceptedWithAnExtraPremium:
  type: radio-group
  label: "3.3 Has any of your proposal for insurance ever been declined or postponed or been accepted with an extra premium."
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    33Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

34DoYouOrYourRelativesHaveOrHadAnyKindOfThreatOnYourtheirLivesOrIsThereAnyCriminalCaseAgainstYou:
  type: radio-group
  label: "3.4 Do you or your relatives have or had any kind of threat on your/their lives or is there any criminal case against you?"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    34Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

35AreYouPoliticallyExposedPersonPEPOrRelatedToAPEP:
  type: radio-group
  label: "3.5 Are you a politically exposed person (PEP) or related to a PEP? (PEP-Politicians, Senior Government Officers, Judges and judicial Officers, Commissioned Officers of Armed forces / police, Members of Commissions / Director Boards / University Councils, Officers of International Organizations.)"
  required: true
  options:
    yes: "Yes"
    no: "No"
  dependencies:
    35Details:
      type: textarea
      label: Please provide details
      required: true
      conditionalOptions:
        operator: eq
        value: "yes"

date:
  type: date
  label: Date
  required: true
  defaultValue: "{{$today}}"

signatureOfLifeAssured:
  type: file
  label: Signature of Life Assured
  required: true
