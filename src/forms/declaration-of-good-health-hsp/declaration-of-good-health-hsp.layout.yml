# dgh-hsp form layout

- field: policyNo
- card: Important <br><br> Please make full disclosure of your health, occupation, habits and pursuits. Non-disclosure or misrepresentation will render your policy NULL and VOID. If you are in doubt as to whether any facts would be material, it is in your interest to disclose them.

- card: 1. Life Assured
