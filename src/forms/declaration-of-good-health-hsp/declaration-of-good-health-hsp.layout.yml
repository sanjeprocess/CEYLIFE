    - field: fullName
    - field: gender
    - field: currentAddress
    - row: 2
      columns:
        - field: country
        - field: city
    - field: emailAddress
    - row: 2
      columns:
        - field: telephoneFixed
        - field: mobile
    - field: dateOfBirth
    - row: 2
      columns:
        - field: height
        - field: weight
    - field: occupation
    - field: employerName
    - field: annualIncome

