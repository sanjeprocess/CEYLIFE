# Layout translations
  formTitle: “நல்லாரோக்கியம் பற்றிய வெளிப்படுத்துகை<br>(HSP / வெளிநாடுகளில் வசிக்கும் வாடிக்கையாளர்கள்)”
  card.important: "முக்கியம்: <br><br> தயவு செய்து உங்கள் உடல் ஆரோக்கியம், தொழில், பழக்கவழக்கங்கள் மற்றும் நாட்டங்கள் பற்றிய முழமையான வெளிப்படுத்துகையை செய்யவும். வெளிப்படுத்தாமை அல்லது பிறழ்கூற்று உங்கள் காப்புறதியை வெற்று வெறிதாக்கும் ஏதாவது முக்கிய அம்சங்கள் தரப்படல் வேண்டுமென நீங்கள் நினைத்தால் அவற்றை வெளிப்படுத்துவது உங்கள் கடமையாகும்."
  card.life_assured: "1.	ஆயுட் காப்புறுதி செய்யப்பட்டவர்"
  card.your_health_condition: "2.	உங்கள் உடல் ஆரோக்கிய நிலைமை "
  text.suffering_from_disorders: "உங்களுக்கு தற்சமயம் கீழ்குறிப்பிட்டுள்ள குறைபாடுகள் / நோய்கள் காணப்படுகின்றனவா? அல்லது கடந்த 10 வருட காலத்தினுள் அக்குறைபாடுகள் / நோய்கள் காணப்பட்டதா?"
  card.other_information: "3.	ஏனைய தகவல்கள்"
  card.declaration: "வெளிப்படுத்துகை"
  text.declaration: "என்னால் மேலே தரப்பட்ட கூற்றுக்கள் மற்றும் பதில்கள் உண்மையானவை மற்றும் சரியானவை என நாம் வெளிப்படுத்துகின்றேன். இக் கூற்றுக்கள் எனக்கும் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட்டிற்கும் இடையிலான காப்புறதியின் அடிப்படையாகும் என்பதையும் ஏற்றுக் கொள்கின்றேன். இந்தப் காப்புறுதியினை ஏற்றுக் கொள்வதற்கான எனது வேண்டுகோளிற்கு முன்னராக அறியப்பட்ட ஏதாவது நோய்கள் அல்லது காயங்கள் சம்பந்தமான எந்தவொரு கோரிக்கைக்கும் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் பொறுப்புடையதாகாது."
  text.authorise: "செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் கம்பனியின் எந்தவொரு பிரதிநிதியோ அல்லது வைத்திய அதிகாரியொருவர் எனது தலைமாட்டுத் துண்டு (BHT) அல்லது ஏதாவது மருத்துவ குறிப்புகளை ஏதாவது அரசினர் / தனியார் வைத்தியசாலை மருத்துவமனை சிகிச்சையகம் அல்லது அடைக்கல நிலையம் இவற்றிலிருந்து பெறவும் பரிசீலனை செய்யவும் மற்றும் வேறொரு காப்புறுதி கம்பனியிலிருந்து தகவல்களைப் பெறுவதற்கும் நான் அதிகாரமளிக்கின்றேன்."
  text.consent: "ஆட்பதிவு திணைக்களத்திலிருந்து எனது / எமது தேசிய அடையாள அட்டை விபரங்களை சரிபார்க்க (நிகழ்நிலை / நேரடியாக) செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் கம்பனிக்கு எனது / எமது சம்மதத்தை வழங்குகின்றோம்."
  text.agree: "நான் விண்ணப்பித்திருக்கும் திட்டங்கள் மற்றும் சேவைகளை வழங்குவதற்காக நான் / நாம் விண்ணப்பித்துள்ள பிரேரணையில் உள்ள எனது / எமது தனிப்பட்ட தகவல்களை பொருத்தமான காரணங்களிற்காக இலங்கைக்குள் அல்லது இலங்கைக்கு வெளியில் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் கம்பனிக்கு அதன் பிரதிநிதிகளுக்கு, முகவர்களுக்கு, கம்பனியின் அதிகாரமளிக்கப்பட்ட சேவை வழங்குநர்கள் மற்றும் மூன்றாம் தரப்பினர்களுக்கு வெளியிடவும், தகவல்களை சேகரிக்கவும் நான் / நாம் ஏற்றுக் கொள்வதுடன் சம்மதத்தையும் வழங்குகின்றேன் / வழங்குகிறோம்."
