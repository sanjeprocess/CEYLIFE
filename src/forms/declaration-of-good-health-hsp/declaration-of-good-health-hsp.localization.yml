en:
  # Layout translations
  card.important: "Important <br><br> Please make full disclosure of your health, occupation, habits and pursuits. Non-disclosure or misrepresentation will render your policy NULL and VOID. If you are in doubt as to whether any facts would be material, it is in your interest to disclose them."
  card.life_assured: "1. Life Assured"
  card.your_health_condition: "2. Your Health Condition"
  text.suffering_from_disorders: "Are you at present suffering from any of the following disorders/diseases or have you suffered from following disorders/diseases during the last 10 years?"
  card.other_information: "Other Information"
  card.declaration: "DECLARATION"
  text.declaration: "I declare that the foregoing statements and answers given by me are true and accurate. I agree that these statements shall be the basis of the insurance policy between myself and Ceylinco Life Insurance Limited. Ceylinco Life Insurance Limited shall not be liable for any claims on account of illness or injury, the cause of which was known prior to approval of my request for this assurance."
  text.authorise: "I authorise any representative or a medical officer of Ceylinco Life Insurance Limited to peruse or obtain the Bed Head Ticket (BHT) or any other clinical notes from any Government / Private Hospital, Clinic, Nursing home, Asylum or sanatorium and authorise to obtain information from any other insurer."
  text.consent: "I hereby give my consent to Ceylinco Life Insurance Limited to verify (Online / Manual) my National Identity Card particulars with the department of Registration of Persons."
  text.agree: "I agree and consent to Ceylinco Life Insurance Limited as well as their respective representatives, agents, the company's authorized service providers and relevant third parties whether within or outside Sri Lanka for collecting, using and / or disclosing my personal data for purposes reasonably required by the company to evaluate my proposal and to provide the products or services which I am applying for."
  submit.button: "Submit Form"
  reset.button: "Reset Form"

