  35AreYouPoliticallyExposedPersonPEPOrRelatedToAPEP.label: "3.5 ඔබ දේශපාලන වශයෙන් අනාවරණය වූ තැනැත්තෙක්ද ? (PEP*) නැතහොත් එවන් පුද්ගලයෙකුගේ සමීප ඥාතියෙකු වේද? *PEP - දේශපාලන වශයෙන් අනාවරණ පුද්ගලයන් යනු දේශපාලනඥයින් හා ඔවුන්ගේ සමීපතයින්, රජයේ උසස් නිලධාරීන්, විනිශ්චයකාරවරුන් හා අධිකරණ නිලධාරීන්, ත්‍රිවිධ හමුදා බලයලත් නිලධාරීන්, උසස් පොලිස් නිලධාරීන්, කොමිෂන් සභාවල අධ්‍යක්ෂ මණ්ඩල හෝ විශ්ව විද්‍යාල පරිපාලන සභා සාමාජිකයින් සහ අන්තර් ජාතික සංවිධානවල සේවකයන්"
