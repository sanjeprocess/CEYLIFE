  35AreYouPoliticallyExposedPersonPEPOrRelatedToAPEP.label: "3.5	நீங்கள் ஒரு அரசியல் ஆபத்துக்களை எதிர்கொள்ளும் (Politically Exposed Person (*PEP) நபரா அல்லது அவர்களுடன் தொடர்புடையவரா? (*PEP – அரசியல்வாதகிள், சிரேஷ்ட அரசாங்க உத்தியோகத்தர்கள், நீதிபதிகள் மற்றும் நீதித்துறை உத்தியோகத்தர்கள், இராணுவ / பொலிஸ் படைகளின் உயர்அதிகாரிகள், ஆணைக்குழக்கள் / பணிப்பாளர் சபை, பல்கலைக்கழக ஆலோசனை சபை என்பவற்றின் உறுப்பினர்கள் மற்றும் சர்வதேச நிறுவனங்களின் அதிகாரிகள்) ஏதாவது ஒரு வினாவிற்கு 'ஆம்' என விடையளிக்கப்பட்டிருந்தால் தயவு செய்து கீழே முழு விபரமும் தருக."
