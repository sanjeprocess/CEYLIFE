si: 
  # Layout translations
  formTitle: “යහපත් සෞඛ්‍ය තත්ත්වය පිළිබඳ ප්‍රකාශනය (හෙල්ත් සපෝර්ට් ප්‍රතිලාභය / විදේශගත ගනුදෙනුකරුවන් සඳහා)”
  card.important: "වැදගත්: <br><br> කරුණාකර ඔබේ සෞඛ්‍ය තත්ත්වය, රැකියාව, විනෝදාංශ හා පුරුදු පිළිබඳ සම්පූර්ණ විස්තරයක් සපයන්න. සත්‍ය තොරතුරක් වසන්කිරීම හෝ වැරදි ආකාරයෙන් සැපයීම, ඔබගේ රක්ෂණ ඔප්පුව ශුන්‍ය හා අවලංගු බවට පත්කිරීමට හේතු වේ. යම් තොරතුරක් වැදගත්ද යන්න පිළිබඳ සැකයක් වේ නම්, එවැන්නක් හෙළිදරව් කිරීම ඔබේ යහපත පිණිසම හේතු වේ."
  card.life_assured: "1. රක්ෂිතයා"
  card.your_health_condition: "2. ඔබේ සෞඛ්‍ය තත්ත්වය"
  text.suffering_from_disorders: "ඔබ දැනට පහත සඳහන් අබලතාවයකින් හෝ රෝගයකින් පෙළෙන්නේද නැතහොත් ඔබ පසුගිය වසර 10 තුළ එවැන්නකින් පෙළුනේද? නොඑසේ නම් එවැන්නක් වැළඳුනේද?"
  card.other_information: "3. වෙනත් තොරතුරු"
  card.declaration: "ප්‍රකාශනය"
  text.declaration: "මා විසින් ලබා දී ඇති ඉහත ප්‍රකාශන සහ පිළිතුරු සත්‍ය හා නිවැරදි බවට මම ප්‍රකාශ කරමි.  මෙම ප්‍රකාශන මා සහ සීමාසහිත සෙලින්කෝ ජීවිත රක්ෂණ සමාගම අතර රක්ෂණ ගිවිසුමේ කොටසක් වන බවට මම එකඟ වෙමි.  මෙම සහතිකය සඳහා මාගේ ඉල්ලීම අනුමත කිරීමට පෙර හේතුව දැන සිටි රෝග හෝ තුවාල සම්බන්ධ කිසිදු හිමිකම්පෑමක් සඳහා සෙලින්කෝ ජීවිත රක්ෂන සමාගම වගකියනු නොලැබේ."
  text.authorise: "මම සෙලින්කෝ ජීවිත රක්ෂණ සමාගමේ කිසියම් නියෝජිතයෙකුට හෝ වෛද්‍ය නිලධාරියෙකුට කිසියම් රජයේ/පෞද්ගලික රෝහලක, සායනයක, නේවාසික රෝහලක, උපස්ථානාගාරයක හෝ ස්වාස්ථාලයක ඇඳ ඉහ ටිකට්පත හෝ වෙනත් කිසියම් සායනික සටහන් කියවා ගැනීමට හෝ ලබාගැනීමට හෝ වෙනත් කිසියම් රක්ෂකයෙකුගෙන් තොරතුරු ලබාගැනීමට අවසරය ලබාදෙමි."
  text.consent: "පුද්ගලයන් ලියාපදිංචි කිරීමේ දෙපාර්තමේන්තුව වෙතින් මාගේ ජාතික හැඳුනුම්පතේ තොරතුරු පරීක්ෂා කිරීමට සෙලින්කෝ ජීවිත රක්ෂණ සමාගමට මෙයින් මාගේ කැමැත්ත ලබාදෙමි."
  text.agree: "මම විසින් ඉදිරිපත් කර ඇති මෙම යෝජනා පත්‍රය තක්සේරු කිරීමේ දී හා ඒ හා සම්බන්ධ රක්ෂණාවරණ හා අනෙකු සේවා සැපයීමට අදාළ අවශ්‍යතාවන් වෙනුවෙන් මාගේ පුද්ගලික තොරතුරු ලබාගැනීමට, භාවිත කිරීමට හෝ හෙළි කිරීමට සෙලින්කෝ ලයිෆ් රක්ෂණ සමාගමට, ඔවුන්ගේ නියෝජිතයන්ට හා ශ්‍රී ලංකාව තුළ හෝ පිටත සිටින එකී සේවා සැපයීමට බලයලත් ආයතන වෙත මෙයින් අවසරය දෙමි."
