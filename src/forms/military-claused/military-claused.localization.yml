  text.name: "තම:"
  text.address: "ලිපිනය :"
  text.manager: "කළමනාකාර තුමා,"
  text.company: "සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ්"
  text.dear: "මහත්මයාණෙනි,"
  text.clause: "මාගේ ජීවිත රක්ෂණ ඔප්පුව පිරිනමනු ලබන්නේ පහතින් දක්වා ඇති වගන්තිය ඇතුලත් කොට බව මා තේරුම් ගන්නා අතර, එම වගන්තියේ අඩංගු වන කොන්දේසිවලට යටත්ව එම ඔප්පුව පිළිගැනිමට මම එකග වෙමි.<br><br>'යුද්ධයක් හෝ යුද්ධයක් බදු මෙහෙයුමක (යුද්ධයක් ප්‍රකාශ කර තිබුණත් නැතත්) නියැලීම හෝ ඊට සහභාගි වීම නිසා හෝ සිවිල් යුද්ධයක, කැරැල්ලක, අභිදෝෂයක, කුමන අන්දමක හෝ ත්‍රස්තවාදී ක්‍රියාවක, ජන කැළඹිමක, හමුදාමය හෝ වෙනත් අන්දමේ රාජ්‍ය පැහැර ගැනීමේ ක්‍රියාවක, කැරලි කෝලාහලයක හමුදා කැරැල්ලක, ආක්‍රමණයක, විදේශ සතුරන්ගේ ක්‍රියාටක, නිත්‍යනුකූලව සංස්ථාපිත අධිබලයකට විරුද්ධව කුමන හෝ අන්දමේ ක්‍රියාවක, කවර ආකාරයකින් නියැලීම නිසා හෝ සහභාගි වීමේ ප්‍රතිඵලයක් ලෙස ස්ථිත රක්ෂිතයා ගේ මරණය සිදුවුවහොත්, ඔප්පුවට අදාල වූ කිසිදු ප්‍රතිලාභයක් ගෙවීමට සමාගමේ වගකීමක් කිසිසේත් ඇති නොවන්නේය.'එහිදී සමාගමේ වගකීම හමුදා / පොලිස් සේවය පිළිබඳ වගන්තියේ සඳහන් ප්‍රතිලාභ වලට පමණක් සීමාවන බවට එකගවෙමි.<br/><br/>තවද, අතිරේක ප්‍රතිලාභ ඔප්පු කොන්දේසි හා බැහැර කිරීම් අනුව මෙම වගන්තියේ සඳහන් කිසියම් ක්‍රියාවලියකට සහභාගි වීමේ ප්‍රතිඵලයක් ලෙස රක්ෂණය කරන ලද සිද්ධියක් සිදුවී ඇති අවස්ථාවකදී ඔප්පුවේ උපලේඛණයේ නිශ්චිතව සඳහන් කර ඇති අතිරේක ප්‍රතිලාභ (රෝහල් ගාස්තු ප්‍රතිලාභයද ඇතුලුව) ගෙවීමට සමාගමේ වගකීමක් නොමැති බවද මම දනිමි."
  text.faithfully: "ඔබගේ විශ්වාසි,"
  submit.button: "පෝරමය පුරවන්න"
  reset.button: "පෝරමයේ දත්ත මකන්න"
