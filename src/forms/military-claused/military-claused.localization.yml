  # Field labels
  topDate.label: ""
  name.label: ""
  address.label: ""
  policyNo.label: "ஆயுள் காப்புறுதி காப்புறுதி ஒப்பந்த இல :"
  assuredName.label: "ஆயுள் காப்புறுதி பெற்றவரின் பெயர் :"
  signature.label: "கையொப்பம்"
  date.label: "திகதி :"

  # Layout translations
  text.date: "திகதி: :"
  text.name: "பெயர்:"
  text.address: "முகவரி :"
  text.manager: "முகாமையாளர்,"
  text.company: "வரையறுக்கப்பட்ட செலிங்கோ ஆயுள் காப்புறுதி நிறுவனம்"
  text.dear: " "
  text.clause: "கீழே கொடுக்கப்பட்டுள்ள விதிப்பிரிவை நான் வாசித்து விளங்கிக் கொண்டேன் என்றும், அதில் குறிப்பிடப்பட்டுள்ள நிபந்தனைகளுக்கு உட்பட்டு எனது ஆயுள் காப்புறுதி கொள்கை வழங்கப்படுகிறது என்றும் இதன் மூலம் நான் வெளிப்படுத்தி ஒப்புக்கொள்கிறேன்.<br><br><b>'ஆயுள் காப்புறுதி செய்யப்பட்டவரின் மரணம், போர் அல்லது போர் போன்ற எந்தவொரு நடவடிக்கையிலும் (போர் அறிவிக்கப்பட்டாலும் இல்லாவிட்டாலும்), உள்நாட்டுப் போர், கலவரம், கிளர்ச்சி, எந்தவொரு பயங்கரவாத நடவடிக்கை, உள்நாட்டுக் கலவரம், இராணுவம் அல்லது அதிகார கையகப்படுத்தல், கலகம், ஆட்சி எதிர்ப்புக் கிளர்ச்சி, படையெடுப்பு, வெளிநாட்டு எதிரிகளின் செயல் அல்லது சட்டப்பூர்வமாக நிறுவப்பட்ட எந்தவொரு அதிகாரத்திற்கும் எதிரான எந்தவொரு செயலிலும் ஈடுபட்டதன் அல்லது பங்கேற்றதன் விளைவாக ஏற்பட்டால், காப்புறுதி ஒப்பந்தத்தின் கீழ் எந்தவொரு கட்டணத்தையும் செலுத்த நிறுவனம் பொறுப்பேற்காது.'</b><br/><br/>காப்புறுதி ஒப்பந்த நிபந்தனைகள் மற்றும் துணை நன்மைகளின் விலக்குகளின்படி, காப்புறுதி ஒப்பந்த அட்டவணையில் வரையறுக்கப்பட்டுள்ளபடி, கூறப்பட்ட நன்மைகளின் கீழ் மேற்கூறிய துணை நன்மைகளின் கீழ் காப்புறுதி செய்யப்பட்ட நிகழ்வு நிகழும்போது குடும்ப மருத்துவமனை பண நன்மை உட்பட எந்தவொரு கட்டணத்தையும் செலுத்த நிறுவனம் பொறுப்பல்ல என்பதை நான் மேலும் ஒப்புக்கொள்கிறேன்."
  text.faithfully: "தங்கள் உண்மையுள்ள,"
  submit.button: "Submit Form"
  reset.button: "Reset Form"
