- row: 12
  columns:
    - text: "Date"
      key: text.date
    - field: topDate

- row: 12
  columns:
    - text: "Name"
      key: text.name
    - field: name
      colspan: 5

- row: 12
  columns:
    - text: "Address"
      key: text.address
    - field: address
      colspan: 5

- text: "The Manager"
  key: text.manager
- text: "Ceylinco Life Insurance Limited"
  key: text.company
- text: "Dear Sir"
  key: text.dear

- field: policyNo  
- field: assuredName

