# foreign-crrency-clause form fields
# Types: text, number, email, password, date, time, datetime-local, checkbox, radio-group, checkbox-group, select, textarea, file, url, tel

proposersName:
  type: text
  label: "Proposer's Name"
  required: false
  placeholder: "Proposer's Name"
  defaultValue: "{{proposers_name}}"

contractNumber:
  type: text
  label: "Contract Number"
  required: false
  placeholder: "Contract Number"
  defaultValue: "{{contract_number}}"

limitedOnDate:
  type: date
  required: false
  label: ""

proposerDate:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
proposerSignature:
  type: file
  label: Signature of the proposer
  required: true
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - .png
      - .jpg
      - .jpeg
      - .pdf
  
explainingPersonDate:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
explainingPersonSignature:
  type: file
  label: Signature of the explaining person the content of the above declaration to the proposer
  required: true
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - .png
      - .jpg
      - .jpeg
      - .pdf