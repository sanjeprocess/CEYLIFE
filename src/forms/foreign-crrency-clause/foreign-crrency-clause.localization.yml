  explainingPersonSignature.label: "மேற்கண்ட அறிவிப்பின் உள்ளடக்கத்தை முன்மொழிபவருக்கு விளக்கும் நபரின் கையொப்பம்."

  # Layout translations
  h2.foreign_currency_heading: "புலம்பெயர் காப்புறுதியாளருக்கான பணம்செலுத்துதல்"
  text.foreign_currency_clause_body: >-
    ஆயுள் காப்புறுதி பெற முன்மொழியப்பட்டுள்ள,  .................................................................சேர்ந்த கீழே கையொப்பமிட்டுள்ள .................................................................................. என்ற நான், இந்த காப்புறுதி தொடர்பாக எனக்கு அல்லது என்னைச் சார்ந்தவர்களுக்கு செலுத்த வேண்டிய அனைத்துப் பணமும், அத்தகைய பணம் செலுத்தப்படும் போதெல்லாம், இலங்கையில், இலங்கை நாணயத்தில் செலுத்தப்படும் என்ற இலங்கையின் நடைமுறையில் உள்ள பரிவர்த்தனை கட்டுப்பாட்டு ஒழுங்குவிதிகளை முழுமையாக அறிந்திருக்கிறேன் என்பதை இதன் மூலம் அறிவிக்கிறேன், மேலும், இந்த நிபந்தனைகளுக்கும், அவ்வப்போது பரிவர்த்தனைக் கட்டுப்பாட்டு விதிமுறைகளில் சேர்க்கப்படக்கூடிய சேர்த்தல்களுக்கான எந்த மாற்றங்களுக்கும் நான் உடன்படுகிறேன் என்றும்; இந்த காப்புறுதி தொடர்பான அனைத்துப் பணத்தையும் செலுத்துவது இந்த நிபந்தனைகளுக்கு உட்பட்டது என்றும், இந்த அறிவிப்பு 
  foreign_currency_clause_body.limited_on_date: "அன்று செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிடெட்டிற்கு நான் செய்த காப்புறுதிக்கான முன்மொழிவின் ஒரு பகுதியாக இருக்கும் என்றும், மூல முன்மொழிவில் உள்ளதைப் போலவே அதே விளைவைக் கொண்டிருக்கும் என்றும் அறிவிக்கிறேன்."
  text.form_explained: >-
    இந்தப் படிவத்தின் உள்ளடக்கங்களை முன்மொழிபவருக்கு நான் விளக்கியுள்ளதுடன், அவர் அதை முழுமையாகப் புரிந்துகொண்ட பின்னர் தனது கையொப்பத்தை இட்டுள்ளார்.

