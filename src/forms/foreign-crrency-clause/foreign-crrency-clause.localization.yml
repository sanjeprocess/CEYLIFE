    I have explained the contents of this form to the proposer and he has affixed his signature after fully understanding the same thereof

si:
  # Field labels
  proposersName.label: "රක්ෂණ යෝජකයාගේ නම"
  contractNumber.label: "රක්ෂණ යෝජකයාගේ අංකය"
  proposerDate.label: "දිනය"
  proposerSignature.label: "(රක්ෂණ යෝජකයාගේ අත්සන)"
  explainingPersonDate.label: "දිනය"
  explainingPersonSignature.label: "ඉහත ප්‍රකාශනයෙහි අඩංගු කරුණු රක්ෂණ යෝජකයා වෙත පැහැදිලි කරන ලද පුද්ගලයාගේ අත්සන"

  # Layout translations
  h2.foreign_currency_heading: "විදේශගත රක්ෂණ ඔප්පු හිමියන් වෙත ගෙවීම්"
  text.foreign_currency_clause_body: >-
    _______________________________ හි පදිංචි {{client_name}} නමැති මම, යෝජිත ජීවිත රක්ෂණය සඳහා මෙහි පහත අත්සන් තබන ලද අතර, මෙම රක්ෂණ සහතිකය මත මා වෙත හෝ මාගේ යැපෙන්නන් වෙත හෝ ගෙවීමට නියමිත වන සියලු මුදල් සම්බන්ධයෙන් දැනට ශ්‍රී ලංකාවේ පවතින විනිමය පාලන රෙගුලාසි සහ එවැනි මුදලක් ගෙවිය යුතු වන අවස්ථාවක දී එම මුදල ශ්‍රී ලංකාව තුළ දී, ශ්‍රී ලංකාවේ ව්‍යවහාර මුදලින් ගෙවනු ඇති බවට මම පූර්ණ වශයෙන් දැනුවත් බව මෙමගින් ප්‍රකාශ කරමි.  තවද, මෙකී කොන්දේසි වලට සහ විනිමය පාලන රෙගුලාසි වෙත කලින් කලට ඇතුළත් කරනු ඇති යම් වෙනස් කිරීම් හෝ එකතු කිරීම් වලට මම එකඟ වන බවත්; මෙම රක්ෂණ සහතිකය සම්බන්ධයෙන් ගෙවීමට නියමිත වන සියලු මුදල් මෙකී කොන්දේසි වලට විෂය වන බවත්, සහ මෙම ප්‍රකාශනය මගින්,
  foreign_currency_clause_body.limited_on_date: "දින දී සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් සමාගම වෙත මා විසින් සිදු කරන ලද රක්ෂණ යෝජනාවලියෙහි කොටසක් නිර්මාණය කෙරෙන බවත්, එය මුල් රක්ෂණ යෝජනාවලියෙහි අඩංගු කළ හා සමාන බලපැවැත්වීමකින් යුතු වන බවත් මම ප්‍රකාශ කරමි."
  text.form_explained: >-
    මෙම පෝරමයේ අඩංගු කරුණු මා විසින් රක්ෂණ යෝජකයා වෙත පැහැදිලි කරන ලද අතර, එය සම්පූර්ණයෙන්ම අවබෝධ කරගැනීමෙන් අනතුරුව ඔහු විසින් මෙම පෝරමයට අත්සන තබන ලදී.

