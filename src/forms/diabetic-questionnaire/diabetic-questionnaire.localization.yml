  text.declare_answers: "நான் அளித்த பதில்கள் எனக்குத் தெரிந்தவரை உண்மையானவை என்றும், முன்மொழிவின் மதிப்பீடு அல்லது ஏற்றுக்கொள்ளலைப் பாதிக்கக்கூடிய எந்தவொரு முக்கிய தகவலையும் நான் மறைக்கவில்லை என்றும் நான் வெளிப்படுத்துகிறேன்."
  text.agree_to_constitute_part_of_proposal: "இந்தப் படிவம் எனது ஆயுள் காப்புறுதித் திட்டத்தின் ஒரு பகுதியாக இருக்கும் என்பதையும், எனக்குத் தெரிந்த எந்தவொரு முக்கிய உண்மைகளையும் வெளியிடத் தவறினால் ஒப்பந்தம் செல்லுபடியற்றதாகிவிடும் என்பதையும் நான் ஏற்றுக்கொள்கிறேன் "
  submit.button: "படிவத்தை நிரப்பவும்"
