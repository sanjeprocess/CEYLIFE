# diabetic-questionnaire form fields

proposerName:
  type: text
  label: 1. Full Name
  required: true
  validation:
    minLength: 3
    maxLength: 100
  defaultValue: "{{client_name}}"
contractNum:
  type: tel
  label: 2. Contract Number
  required: true
  validation:
    minLength: 3
    maxLength: 100
  defaultValue: "{{contract_number}}"
dateDiagnosed:
  type: date
  label: 3. Date diabetes Diagnosed
  required: true
  validation:
    minLength: 3
    maxLength: 100
nameAndAddressOfTheDoctor:
  type: text
  label: 4. Name and address of the doctor or clinic now treating you
  required: true
  validation:
    minLength: 3
    maxLength: 100
strictDiet:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 5. Do you follow a strict Diet?
  required: true
  validation:
    minLength: 3
    maxLength: 100
  orientation: horizontal
  dependencies:
    strictDietDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Please give details
      defaultValue: ""
      validation:
        minLength: 3
        maxLength: 100
      conditionalOptions:
        operator: eq
        value: yes
oralDrug:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 6. Are you now having oral drug treatment? if so, please give the name of the
    drug and dosage
  required: true
  validation:
    minLength: 3
    maxLength: 100
  orientation: horizontal
  dependencies:
    oralDrugDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Enter the name of the drug and dosage.
      defaultValue: ""
      validation:
        minLength: 3
        maxLength: 100
      conditionalOptions:
        operator: eq
        value: yes
insulin:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: "7. Are you now taking Insulin? If so, please give the number of units per day"
  required: true
  validation:
    minLength: 3
    maxLength: 100
  orientation: horizontal
  dependencies:
    insulinDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Enter the number of units per day.
      defaultValue: ""
      validation:
        minLength: 3
        maxLength: 100
      conditionalOptions:
        operator: eq
        value: yes
oralInsulinVaried:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 8. Has your intake of Insulin or oral drugs varied during the last 2 years?
    If so, please give full details
  required: true
  validation:
    minLength: 3
    maxLength: 100
  orientation: horizontal
  dependencies:
    oralInsulinVariedDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Please give full details
      defaultValue: ""
      validation:
        minLength: 3
        maxLength: 100
      conditionalOptions:
        operator: eq
        value: yes
urineCheck:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 9. Do you check your urine on a regular basis? If so, how often does it
    contain sugar?
  required: true
  validation:
    minLength: 3
    maxLength: 100
  orientation: horizontal
  dependencies:
    urineCheckDetails:
      type: radio-group
      options:
        never: a.)Never
        Rarely: b.)Rarely
        occasionally: c.)Occasionally
        Often: d.)Often
      label: Details
      required: true
      defaultValue: ""
      validation:
        minLength: 3
        maxLength: 100
      conditionalOptions:
        operator: eq
        value: yes
coma:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 10. Since your treatment began have you ever had a diabetic or Insulin Coma?
    (If so please give details including dates.)
  required: true
  orientation: horizontal
  dependencies:
    comaDetails:
      type: textarea
      label: Details
      required: true
      placeholder: Enter details including the dates.
      defaultValue: ""
      conditionalOptions:
        operator: eq
        value: yes
illnesses:
  type: radio-group
  options:
    no: No
    yes: Yes
  label: 11. Have you ever had any illness or disease of the Heart, Kidneys, Eyes,
    Circulatory or Nervous System? If so, please give full details.
  required: true
  orientation: horizontal
  dependencies:
    illnessesDetails:
      type: textarea
      label: Details
      required: true
      placeholder: Enter in full details
      defaultValue: ""
      conditionalOptions:
        operator: eq
        value: yes
date:
  type: date
  label: Date
  required: true
  defaultValue: ""
signature:
  type: file
  label: Signature
  required: false
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - jpg
      - png
      - jpeg
      - pdf
