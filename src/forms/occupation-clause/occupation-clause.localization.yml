  signature.label: "Signature"

  # Layout translations
  card.occupation_clause: "රැකියාව පිළිබඳ වගන්තිය"
  text.occupation_clause_body: "**It is hereby declared and agreed, that if the Life Assured / Spouse Assured meets with an accident whilst being engaged in his usual occupation as indicated in the Proposal Form or Declaration of Good Health, the Company will not be liable to pay the supplementary benefits under the Policy, viz. Jeewayathra Accidental Death Benefit, Jeewayathra Monthly Income Benefit, Jeewayathra Partial and Permanent Disability Benefit.**"
  card.consent.title: "Consent"
  text.consent_body: "I have read and understood the afore-said clause and hereby give my consent to accept the Life Assurance proposal subject to respective clause."

si:
  ProposerName.label: "රක්ෂණ යෝජකයාගේ නම:"
  contactNumber.label: "දුරකථන අංකය:"
  nicNumber.label: "ජාහැප අංකය:"
  date.label: "දිනය:"
  signature.label: "රක්ෂණ යෝජකයාගේ අත්සන "

  # Layout translations
  card.occupationClause: "**රැකියාව පිළිබඳ වගන්තිය**"
  text.occupation_clause_body: "<b>යෝජනාවලි පෝරමයෙහි හෝ මනා සෞඛ්‍ය තත්ත්වය පිළිබඳ ප්‍රකාශනයෙහි හෝ දක්වා ඇති පරිදි ජීවිත රක්ෂකයා / රක්ෂකයාගේ කලත්‍රයා, සිය සුපුරුදු වෘත්තීමය කටයුතු වල නියුතුව සිටින අතරතුර හදිසි අනතුරකට ලක් වුවහොත්, රක්ෂණ ඔප්පුව යටතේ වන අතිරේක ප්‍රතිලාභ, එනම්; ජීවයාත්‍රා හදිසි මරණ ප්‍රතිලාභය, ජීවයාත්‍ර මාසික ආදායම් ප්‍රතිලාභය, ජීවයාත්‍රා අර්ධ සහ ස්ථිර ආබාධිත ප්‍රතිලාභය ගෙවීමට සමාගම වගකිය යුතු නොවන බව මෙමගින් ප්‍රකාශ කර ඊට එකඟ වේ.</b>"
  card.consent: " "
  text.consent_body: "ඉහත වගන්තිය මා විසින් කියවා, තේරුම් ගෙන, එකී අදාළ වගන්තියට යටත් ව ජීවිත රක්ෂණ යෝජනාවලිය පිළිගැනීමට මා විසින් මෙමගින් මාගේ කැමැත්ත ලබා දෙමි."
ta: 
  ProposerName.label: "முன்மொழிவாளரின் பெயர்"
  contactNumber.label: "தொடர்பு இலக்கம்:"
  nicNumber.label: "தே.அ.அ. இலக்கம்:"
  date.label: "திகதி:"
  signature.label: "முன்மொழிபவரின் கையொப்பம்"

  # Layout translations
  card.occupationClause: "**தொழில்சார் விதிப்பிரிவு**"
  text.occupation_clause_body: "**ஆயுள் காப்புறுதி செய்யப்பட்டவர் / வாழ்க்கைத் துணை தனது வழக்கமான தொழிலில் ஈடுபடும்போது,  முன்மொழிவு படிவம் அல்லது சிறந்த ஆரோக்கியம் பற்றிய பிரகடனத்தில் குறிப்பிடப்பட்டுள்ளபடி விபத்து ஏற்பட்டால், நிறுவனமானது காப்புறுதி ஒப்பந்தத்தின் கீழ் துணை நன்மைகளை, அதாவது ஜீவயாத்ரா விபத்து இறப்பு நன்மை, ஜீவயாத்ரா மாதாந்த வருமான நன்மை, ஜீவயாத்ரா பகுதியளவு மற்றும் நிரந்தர வலுவிழந்தோர் நன்மை ஆகியவற்றை செலுத்த பொறுப்பேற்காது என்று இதன்மூலம் அறிவிக்கப்பட்டு ஒப்புக் கொள்ளப்படுகிறது.**"
  card.consent: " "
  text.consent_body: "மேற்படி விதிப்பிரிவை நான் வாசித்து விளங்கிக்கொண்டேன், மேலும் அந்தந்த விதிப்பிரிவிற்கு உட்பட்டு ஆயுள் காப்புறுதித் திட்டத்தை ஏற்க இதன் மூலம் எனது சம்மதத்தை அளிக்கிறேன்."
