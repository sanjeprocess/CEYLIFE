# occupation clause submission
baseUrl: https://app.workhub24.com
endpoint: /api/workflows/MB4EALVIJI66HLKVX6LISPLOZ6HYZL6C/w0325a937d2/cards
method: POST
requiresAccessToken: true

headers:
  - name: Content-Type
    value: application/json
  - name: Authorization
    value: Bearer {{$WORKHUB_TOKEN}}

fieldMapping:
  - from: $variable
    to: cLOUReferenceNumber
    value: "{{clou_reference}}"

  - from: contractNumber
    to: contractNumber
    returnType: string

  - from: date
    to: date
    returnType: string
    transform: toDate

  - from: $variable
    to: initialRecordCardID
    value: "{{card_id}}"

  - from: nicNumber
    to: nICNumber
    returnType: string

  - from: ProposerName
    to: proposersName
    returnType: string

  - from: $variable
    to: requestType
    value: "{{request_type}}"

  - from: $variable
    to: sequenceNo
    value: "{{contract_sequence}}"

  - from: signature
    to: signatureOfTheProposer
    returnType: string

  - from: [contractNumber, ProposerName]
    to: title
    returnType: string
    script: |
       if (value) {
           value = value.replaceAll(' ', '_');
           return value;
       }
       return 'title_not_generated';
