# occupation-clause form fields

ProposerName:
  type: text
  label: Proposer's Name
  required: true
  placeholder: Proposer's Name
  description: Proposer's Name
  defaultValue: ""
contractNumber:
  type: text
  label: Contract Number
  required: true
  placeholder: Contract Number
  defaultValue: ""
nicNumber:
  type: text
  label: NIC Number
  required: true
  placeholder: Enter NIC Number
  defaultValue: ""
date:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
signature:
  type: file
  label: Signature
  required: true
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - .png
      - .jpg
      - .jpeg
      - .pdf
