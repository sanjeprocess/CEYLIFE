# occupation-clause form fields

ProposerName:
  type: text
  label: Proposer's Name
  required: true
  placeholder: Proposer's Name
  defaultValue: "{{client_name}}"
contactNumber:
  type: tel
  label: Contact Number
  required: true
  placeholder: Contact Number

nicNumber:
  type: text
  label: NIC Number
  required: true
  placeholder: Enter NIC Number
  defaultValue: ""
date:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
signature:
  type: file
  label: Signature
  required: false
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - png
      - jpg
      - jpeg
      - pdf
