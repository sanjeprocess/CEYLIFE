# declaration-for-cash form layout
# Items: field, h1, h2, h3, h4, h5, h6, text, spacer, divider, card, row, submit, reset

- card:
  items:
    - row: 2
      columns:
        - field: clientNo
        - field: policyNo

    - row: 12
      columns:
        - field: nameTitle
          colspan: 1
        - field: nameOfChild
          colspan: 11

    - row: 4
      columns:
        - field: dateOfBirth
        - field: age
        - field: height
        - field: weight

    - field: address
    - field: nicNo
    - field: personalPhysicianName

    - row: 2
      columns:
        - field: email
          colspan: 1
        - field: telephone
          colspan: 1

    - text: Benefits Required
    - field: familyDigasiriPlus
    - field: hospitalCashPlus
    - field: majorSurgeryPlus
    - field: healthSupportPlus
- card:
  items:
    - field: isChildGoodHealth
- card:
  items:
    - text: 2. Is your child ever suffered or is he/she suffering from
    - field: circulatoryDisease
    - field: respiratoryDisease
    - field: genitourinaryDisease
    - field: gastrointestinalDisease
    - field: nervousSystemDisease
    - field: otherMajorDiseases
    - field: chronicSymptoms
    - field: otherAilments

- card:
  items:
    - field: hospitalTreatment
    - field: paediatricianConsultation
    - field: disabilityBenefit
    - field: existingPolicy
    - field: declinedProposal
    - text: "8."
    - field: smokedLast12Months
    - field: smokeNow
    - field: drugsOrNarcotics
    - field: alcoholConsumption

- card:
  items:
    - field: hazardousActivities
    - field: criminalOffence
    - field: pendingLitigation

- card: DECLARATION
  items:
    - text: The foregoing statements and answers are complete and true and we agree that the statements and answers shall be the basis of the contract of this assurance between this chid and Ceylinco Life Insurance Limited, Ceylinco Life Insurance Limited shall not be liable for any claim in the event of death or on account of illness or injury the cause of which was known to the proposer's prior to acceptance of the proposal or any information or material facts withheld or concealed
    - text: We hereby authorise any doctor, nurse or hospital official to disclose to Ceylinco Life Insurance Limited. any and all information regarding this child's past medical history, present treatment and the results of any investigation carried out
    - row: 8
      columns:
        - text: Dated at
        - field: datedAt
        - text: On this
        - field: onThis
        - text: day of
        - field: dayOf
        - text: "20"
        - field: yearOf
    - row: 2
      columns:
        - field: fathersSignature
        - field:  fathersNic
    - row: 2
      columns:
        - field: mothersSignature
        - field: mothersNic
    - text: Witnesses 1
    - text: I certify that the signature 1-2 was/were placed in my presence
    - row: 2 
      columns:
        - field: witness1Signature
        - field: witness1Name
    - row: 2
      columns:
        - field: witness1Address
        - field: witness1Nic
    - text: Witnesses 2
    - text: I certify that the signature 1-2 and witness 1 were placed in my presence
    - row: 2
      columns:
        - field: witness2Signature
        - field: witness2Name
    - row: 2
      columns:
        - field: witness2Address
        - field: witness2CodeNo

        
- spacer: 20
- row: 12
  columns:
    - submit: Submit Form
      key: submit.button
      align: center
      margin: 30px 0 0 0
      variant: default
    - reset: Reset Form
      key: reset.button
      align: center
      margin: 30px 0 0 0
      variant: outline
