  text.isChildEverSuffered: "2. 2.	உங்கள் பிள்ளை பின்வரும் நோய்களினால் எப்போதாவது அவஸ்தைப்பட்டுள்ளாரா? அல்லது தற்போது அவஸ்தைப்படுகின்றாரா?"
  text.foregoingStatements: "மேலே தரப்பட்ட கூற்றுக்கள் விடைகள் என்பன முழமையானதும் உண்மையானதும் என்பதுடன் இக்கூற்றுக்களும் விடைகளுமே இப்பிள்ளைக்கும் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட்க்கும் இடையிலான இக்காப்புறுதி ஒப்பந்தத்தின் அடிப்படையாகும் என்பதை நாங்கள் ஏற்றுக் கொள்கின்றோம். இப்பிரேரணை ஏற்றுக் கொள்ளப்படுவதற்கு முன்பதாக, பிரேரணையாளருக்கு / பிரேரணையாளர்களுக்கு காரணம் தெரிந்திருந்த சுகயீனம் அல்லது காயம் அல்லது இறப்பு நிகழுமிடத்து அல்லது மேற்கூறிய கூற்றுக்களில் மறைக்கப்பட்ட அல்லது வெளியிடப்படாத ஏதாவது முக்கிய உண்மைகள் இருக்கும் பட்சத்தில் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் எந்தவொரு கோரிக்கைக்கும் பொறுப்பேற்க மாட்டாது."
  text.authoriseDisclosure: "இப்பிள்ளையின் மருத்துவ வரலாறு, தற்போதைய சிகிச்சைகள் அத்துடன் ஏதாவது மருத்துவப் புலனாய்வுகளின் முடிவுகள் இவை பற்றிய ஏதாவது அத்துடன் எல்லாத் தகவல்களையம் செலிங்கோ லைஃப் இன்சூரன்ஸ் லிமிட்டட் க்கு வெளிவிடுவதற்கு எந்தவொரு வைத்தியர் மருத்துவத்தாதி அல்லது வைத்தியசாலை அதிகாரி இவர்களுக்கு இத்தால் அதிகாரமளிக்கின்றோம்."
