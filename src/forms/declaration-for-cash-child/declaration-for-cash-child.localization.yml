  text.isChildEverSuffered: "2. ඔබේ දරුවා පහත සඳහන් කවර හෝ තත්ත්වයකින් යම් දිනෙක පෙළී ඇත්ද නැතහොත් දැනට පෙළෙන්නේය ද?"
  text.foregoingStatements: "ඉහත අසා ඇති ප්‍රශ්න වලට අප විසින් කරන ලද ප්‍රකාශන සහ පිළිතුරු සම්පූර්ණ හා සත්‍ය බවත් අප දරුවාගේ රක්ෂණ ආවරණය සඳහා එම ප්‍රකාශන සහ පිළිතුරු පදනම් වන බව දන්නා බවත්, ඒවා අප දරුවා සහ සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් අතර ගිවිසුමේ පදනම් බවත් අපි දනිමු. මෙම රක්ෂණය සඳහා යෝජනාව අනුමත වීමට පෙර දරුවාගේ සෞඛ්‍ය තත්ත්වය පිළිබඳව හෝ වෙනත් දැන සිටි කිසිම තොරතුරක් වසන් කර හෝ මෙහි කිසියම් අසත්‍ය කරුණක් අඩංගු වී හෝ තිබුනේ නම් සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් විසින් අප දරුවාගේ රෝගයක් හෝ අනතුරක් සම්බන්ධයෙන් කිසිම වගකීමක් භාර නොගන්නා බවත් අපි දනිමු."
  text.authoriseDisclosure: "අපි දරුවාගේ ‍වෛද්‍යමය ඉතිහාසය පිළිබඳව හෝ වර්තමාන ප්‍රතිකාර පිළිබඳව හෝ වෛද්‍ය පරීක්‍ෂණ ප්‍රතිඵල පිළිබඳ සියලු තොරතුරු සෙළින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් වෙත නිරාවරණය කිරීම සඳහා කවර හෝ ශාරීරික/ශල්‍ය වෛද්‍යවරයෙකුට, හෙදියකට හෝ ආරෝග්‍යශාලා නිලධාරියෙකුට මින් බලය පවරා සිටිමු."
