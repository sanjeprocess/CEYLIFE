# health-support-benefit form fields
# Types: text, number, email, password, date, time, datetime-local, checkbox, radio-group, checkbox-group, select, textarea, file, url, tel

name:
  type: text
  label: Name
  required: false
  placeholder: Enter value
  description: This is an example field. Replace or remove as needed.
  defaultValue: "{{client_name}}"
policyNumber:
  type: text
  label: Policy Number
  required: false
  placeholder: Enter value
  description: This is an example field. Replace or remove as needed.
  defaultValue: "{{policy_no}}"
date:
  type: date
  label: Date
  required: true
  defaultValue: "{{$today}}"

signature:
  type: file
  label: Signature of Life Assured
  required: true

