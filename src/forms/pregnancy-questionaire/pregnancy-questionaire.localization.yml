  card.pastPregnancy: "පසුගිය ගර්භනී අවස්ථා පිළිබඳ විස්තර"
  text.declaration: "ඉහත පිළිතුරු මාගේ දැනුමේ ප්‍රකාර සත්‍ය හා නිවැරදි බව ප්‍රකාශ කර සිටිමි.තවද මෙම ආකෘති පත්‍රය යෝජනා පත්‍රයේම කොටසක් බවත්, කිසියම් වැදගත් තොරතුරක් වසන් කිරීමෙන් මෙම ගිවිසුම අහෝසි වීමට හේතු වන බව මා දන්නා බවත් ප්‍රකාශ කරමි."
