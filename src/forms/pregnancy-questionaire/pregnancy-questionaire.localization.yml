ta:
  # Field labels
  proposersName.label: "பிரேரிப்பவரின் பெயர்"
  contractNumber.label: "பிரேரணை இல"
  firstDateOfMenstrualPeriod.label: "3. 	கடைசி மாதவிடாய் ஆரம்பித்த திகதி :"
  deliveryDate.label: "4.	மகப்பேறு எதிர்பார்க்கப்படும் திகதி :"
  medicalDetails.label: "5. உங்களுக்கு உயர் குருதியமுக்கம், நீரிழிவு அல்லது வேறேதும் கர்ப்ப கால சிகிச்சை அளிக்கப்படுகின்றதா? அல்லது தொடர்ச்சியான மருத்துவக் கண்காணிப்பில் உள்ளீரா? 'ஆம்' எனில், விபரங்கள் தருவதுடன் தொடர்புடைய மருத்துவ அறிக்கைகளையும் சமர்ப்பிக்கவும்"
  
  abnormalitiesPertaining.label: "6.	தற்போதைய கர்ப்பம் தொடர்புடைய எதுவிதமான சிக்கல்கள் பற்றி நீங்கள் அறிந்துள்ளீர்களா? 'ஆம்' எனில் தயவுசெய்து விபரங்களைத் தரவும். "
  abnormalitiesPertaining.options.yes: "ஆம்"
  abnormalitiesPertaining.options.no: "இல்லை"
  
  abnormalitiesDetails.label: "தயவுசெய்து விவரங்களை வழங்கவும்."

  haveChildren.label: "1.	உங்களுக்கு பிள்ளைகள் உண்டா?  "
  haveChildren.options.yes: "ஆம்"
  haveChildren.options.no: "இல்லை"

  childrenNo.label: "'ஆம்' எனில், எத்தனை பேர்?"

  prematureBirth.label: "2.	இவற்றுள் குறைமாதப் பிள்ளைகள் உள்ளனரா? "

  treatedforPregnancyRelatedComplications.label: "3.	கடந்த பிரசவங்களின் போது உயர் குருதியமுக்கம், நீரிழிவு, அல்லது அசாதாரண சிறுநீர் / குருதிப் பரிசோதனை அறிக்கைகள் அல்லது வேறேதாவது சுகயீனங்களினால் பாதிக்கப்பட்டிருந்தீர்களா? 'ஆம்' எனில், விபரங்கள் தருக. "
  treatedforPregnancyRelatedComplications.options.yes: "ஆம்"
  treatedforPregnancyRelatedComplications.options.no: "இல்லை"

  complicationsDetails.label: "தயவுசெய்து விவரங்களை வழங்கவும்."

  date.label: "திகதி"
  signature.label: "ஆயுட்காப்புறுதி செய்யப்பட்டவரின் கையொப்பம்"

  # Layout translations
  h1.title: "கர்ப்பம் தொடர்பான வினாக்கொத்து"
  card.presentPregnancy: "தற்போதைய கர்ப்பம்"
  card.pastPregnancy: "முன்னைய கர்ப்பம்"
  text.declaration: "மேற்குறிப்பிட்ட விடைகள் எனது அறிவுக்கெட்டிய வரையில் உண்மை எனவும் சரியானவை எனவும் வெளிப்படுத்துகின்றேன். இந்த வினாக்கொத்து எனது ஆயுள்காப்புறுதி பிரேரணையின் பகுதி என்பதையும், எனக்கு தெரிந்த முக்கியமான தகவல்களை வெளிப்படுத்தாமை எனது காப்புறுதியை செல்லுபடியற்றதாக்கலாம் என்பதற்கு நான் உடன்படுகின்றேன்."
  submit.button: "படிவத்தை நிரப்பவும்"
  reset.button: "படிவத் தரவை நீக்கு"
