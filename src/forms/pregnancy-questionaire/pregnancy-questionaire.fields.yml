# pregnancy-questionaire form fields
# Types: text, number, email, password, date, time, datetime-local, checkbox, radio-group, checkbox-group, select, textarea, file, url, tel
proposersName:
  type: text
  label: "Proposer's Name"
  required: false
  placeholder: "Proposer's Name"
  defaultValue: "{{client_name}}"

contractNumber:
  type: text
  label: "Contract Number"
  required: false
  placeholder: "Contract Number"
  defaultValue: "{{contract_number}}"

firstDateOfMenstrualPeriod:
  type: date
  label: "3. Date of first date of the last menstrual period"
  required: false

deliveryDate:
  type: date
  label: "4. Expected date of delivery"
  required: false

medicalDetails:
  type: textarea
  label: "5. Are you being-treated or closely monitored due to elevated blood pressure, diabetes or for any other pregnant related complications? if so,please give details and forward related medical reports."
  required: false

abnormalitiesPertaining: 
  type: radio-group
  label: "6. Are you aware of any abnormalities pertaining to current pregnancy? If so, please give details. "
  required: false
  options:
    yes: Yes
    no: No
  dependencies:
    abnormalitiesDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Enter Details
      conditionalOptions:
        operator: eq
        value: yes

haveChildren:
  type: radio-group
  label: 1. Do you have  children? If yes, state the number. 
  required: false
  options:
    yes: Yes
    no: No
  dependencies:
    childrenNo:
      type: number
      label: Number of Children
      required: false
      placeholder: Enter Number of Children
      conditionalOptions:
        operator: eq
        value: yes

prematureBirth:
  type: textarea
  label: 2. Were there any premature births? 
  required: false

treatedforPregnancyRelatedComplications:
  type: radio-group
  label: 3. During past pregnancy/ies, were you treated for elevated blood pressure, blood sugar or any adverse urine / blood reports or other illness/es? If so, please give details. 
  required: false
  options:
    yes: Yes
    no: No
  dependencies:
    complicationsDetails:
      type: textarea
      label: Details
      required: false
      placeholder: Enter Details
      conditionalOptions:
        operator: eq
        value: yes


date:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""

signature:
  type: file
  label: Signature of the life to be assured
  required: false
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - png
      - jpg
      - jpeg
      - pdf