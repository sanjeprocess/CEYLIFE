# pregnancy-questionaire form layout
# Items: field, h1, h2, h3, h4, h5, h6, text, spacer, divider, card, row, submit, reset

- card:
  items:
    - field: proposersName
    - field: contractNumber
- h1: Pregnancy Questionaire
  align: center
  margin: 0 0 -10px 0
- text: Form description for Pregnancy Questionaire
  align: center
  margin: 0 0 25px 0

- card: Prsent pregnancy
  items:
    - field: firstDateOfMenstrualPeriod
    - field: deliveryDate
    - field: medicalDetails
    - field: abnormalitiesPertaining
    
- card: Previous pregnancy
  items:
    - field: haveChildren
    - field: prematureBirth
    - field: treatedforPregnancyRelatedComplications
- text: I declare that the above answers I have given are to the best of my knowledge true and correct. I agree that this form will constitute part of my proposal for life assurance and that failure to disclose any material fact known to me may invalidate the said contract.
 
- row: 2
  columns:
    - field: date
    - field: signature

- row: 12
  columns:
    - submit: Submit Form
      key: submit.button
      align: center
      margin: 30px 0 0 0
      variant: default
    - reset: Reset Form
      key: reset.button
      align: center
      margin: 30px 0 0 0
      variant: outline