  # medicalConditions.description: தயவுசெய்து உங்களுக்கு கண்டறியப்பட்ட எந்த மருத்துவ
  #   நிலைமைகளையும் தேர்ந்தெடுக்கவும்.
  # medicalConditions.options.diabetes: நீரிழிவு
  # medicalConditions.options.hypertension: உயர் இரத்த அழுத்தம்
  # medicalConditions.options.heart_disease: இதய நோய்
  # medicalConditions.options.asthma: ஆஸ்துமா
  # medicalConditions.options.none: மேலே எதுவும் இல்லை
