# liquor-trade-questionnaire form fields

ProposerName:
  type: text
  label: Proposer's Name
  required: false
  placeholder: Proposer's Name
  description: Proposer's Name
  defaultValue: "{{proposers_name}}"
proposalNum:
  type: number
  label: Proposal Number
  required: false
  placeholder: Proposal Number
  description: Proposal Number
  defaultValue: "{{proposal_number}}"
occupation:
  type: text
  label: 1. What is your occupation? if more than one, State all occupations.
  required: false
  placeholder: Enter occupation(s)
  defaultValue: ""
dutyInvolve:
  type: checkbox-group
  label: "2. Do your duties involve (give details) :"
  required: false
  defaultValue: ""
  options:
    Regular attendance at a bar: (a) Regular attendance at a bar?
    Part time attendance at a bar: (b) Part time attendance at a bar?
    Supervisory duties only: (c) Supervisory duties only?
    A regular shift or changeable working hours: (d) A regular shift or changeable working hours?
    Working in a brewery, distillery or winery: (e) Working in a brewery, distillery or winery?
teetotaler:
  type: radio-group
  label: 3. Are you a teetotaler?
  required: false
  defaultValue: ""
  options:
    yes: Yes
    no: No
  orientation: horizontal
  dependencies:
    Details:
      type: textarea
      label: Details
      required: false
      placeholder: Enter Details
      conditionalOptions:
        operator: eq
        value: yes
liquorType:
  type: textarea
  label: (a) Type of liquor consumed
  required: false
  placeholder: Enter liquor type(s)
  defaultValue: ""
avvgDailyIntake:
  type: textarea
  label: "(b) Average daily intake in units. (One unit represents: 1 ounce
    spirits, or 4 ounces wine, or 10 ounces beer.)"
  required: false
  placeholder: Enter average daily intake
  defaultValue: ""
health:
  type: textarea
  label: 4. Has consumption of liquor ever affected your health or ability to work?
  required: false
  placeholder: Enter  details
  defaultValue: ""
smoker:
  type: radio-group
  label: 5. Are you a smoker?
  required: false
  defaultValue: ""
  options:
    yes: Yes
    no: No
  orientation: horizontal
  dependencies:
    Details:
      type: textarea
      label: Details
      required: false
      placeholder: Enter Details
      conditionalOptions:
        operator: eq
        value: yes
changeTheNature:
  type: radio-group
  label: 6. Do you intend to change the nature of the work you perform in the next
    twelve months? (if so give details.)
  required: false
  defaultValue: ""
  options:
    yes: Yes
    no: No
  orientation: horizontal
  dependencies:
    Details:
      type: textarea
      label: Details
      required: false
      placeholder: Enter Details
      conditionalOptions:
        operator: eq
        value: yes
date:
  type: date
  label: Date
  required: true
  placeholder: Date
  defaultValue: ""
signature:
  type: file
  label: Signature
  required: true
  defaultValue: ""
  fileOptions:
    maxFileSize: 10485760
    allowedExtensions:
      - .png
      - .jpg
      - .jpeg
      - .pdf
