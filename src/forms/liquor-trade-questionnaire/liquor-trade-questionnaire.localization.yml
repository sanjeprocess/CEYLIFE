si: 
  formTitle: මත්පැන් වෙළඳාම පිළිබඳ ප්‍රශ්නාවලිය
  # Field Labels
  ProposerName.label: "යෝජකයාගේ නම :"
  proposalNum.label: "යෝජනාපත්‍ර / ඔප්පු අංකය :"
  occupation.label: "1. ඔබගේ රැකියාව කුමක්ද? රැකියාවන් එකකට වඩා තිබේ නම්, සියළු රැකියාවන් සඳහන් කරන්න."
  dutyInvolve.label: "2. ඔබගේ රාජකාරි පහත දැක්වෙන කුමන කාණ්ඩයන්ට අයත් ද? (විස්තර දක්වන්න)"
  teetotaler.label: "3. ඔබ මත්පැන් පානයෙන් සම්පුර්ණයෙන්ම වෙන් වූ තැනැත්තෙක්ද? එසේ නම් ඔබ හැම විටම ඒ තත්වය පවත්වා ගෙන සිටියේද?"
  teetotalerDetails.label: "කරුණාකර විස්තර දක්වන්න."
  liquorType.label: "(a) භාවිතා කළ මත්පැන් වර්ගය කුමක්ද?"
  avgDailyIntake.label: "(b)සාමාන්‍ය වශයෙන් දිනපතා ගන්නා ප්‍රමාණය ඒකකවලින් දක්වන්න.එක් ඒකකයක් වනුයේ,(ස්ප්‍රිතු අවුන්ස 01ක් හෝ වයින් අවුන්ස 04 ක් හෝ බියර් අවුන්ස 10ක් හෝ වේ.)"
  health.label: "4. මත්පැන් භාවිතය කෙදිනක හෝ ඔබගේ සෞඛ්‍ය තත්ත්වය මත හෝ වැඩ කිරීමේ හැකියාව මත හෝ බලපෑමක් ඇති කළේද?"
  smoker.label: "5. ඔබ දුම් පානය කරන්නේ ද? එසේ නම් දිනකට පානය කරන සංඛ්‍යාව දක්වන්න."
  smokerDetails.label: "කරුණාකර විස්තර දක්වන්න."
  changeTheNature.label: "6. ඔබ නියැලී සිටින කාර්යයන්හි ස්වාභාවය ඉදිරි මාස දොළහ ඇතුලත දී වෙනස් කිරීමට ඔබ බලාපොරොත්තු වන්නේද? (එසේ නම්, විස්තර දක්වන්න)"
  changeTheNatureDetails.label: "කරුණාකර විස්තර දක්වන්න."
  date.label: "දිනය :"
  signature.label: "යෝජකයාගේ අත්සන :"

  # Options
  dutyInvolve.options.Regular attendance at a bar: "(a) තැබෑරුමක කාර්යයන්හි දිනපතා නිරත වේද"
  dutyInvolve.options.Part time attendance at a bar: "(b) තැබෑරුමක කාර්යයන්හි අර්ධකාලීනව නිරත වේ ද"
  dutyInvolve.options.Supervisory duties only: "(c) වැඩ පරීක්ෂක කටයුතු වල පමණක් නිරත වේද"
  dutyInvolve.options.A regular shift or changeable working hours: "(d) ඒකාකාරී වූ වැඩ මුරයකට හෝ වෙනස් වන්නා වූ වැඩ මුරයකට යටත් ද"
  dutyInvolve.options.Working in a brewery, distillery or winery: "(e) සේවය කරන්නේ මධ්‍ය පෙරන ස්ථානයක, ස්කාගාරයක, වයින් සාදන ස්ථානයක"
  
  teetotaler.options.yes: "ඔව්"
  teetotaler.options.no: "නැත"
  
  smoker.options.yes: "ඔව්"
  smoker.options.no: "නැත"
  
  changeTheNature.options.yes: "ඔව්"
  changeTheNature.options.no: "නැත"

  # Layout Texts
  text.declare: "ඉහත සපයා ඇති ප්‍රශ්ණ වලට මා විසින් සපයන ලද පිළිතුරු සත්‍ය බව ප්‍රකාශ කරමි. තවද, මෙම ආකෘති පත්‍රය මා විසින් සෙලින්කෝ ලයිෆ් ඉන්ෂුවරන්ස් ලිමිටඩ් වෙත ඉදිරිපත් කළ ජිවිත රක්ෂණ යෝජනා පත්‍රයේම කොටසක් බවත්, කිසියම් වටිනා තොරතුරක් වසන් කිරීමෙන් එම ගිවිසුම අහෝසි වන බවත්, මා දන්නා බව ප්‍රකාශ කරමි."
  text.agree: " "
  submit.button: "පෝරමය පුරවන්න"
  reset.button: "පෝරමයේ දත්ත මකන්න"



ta: 
  formTitle: மதுவிற்பனை சம்பந்தமான வினாக்கொத்து
  # Field Labels
  ProposerName.label: "பிரேரிப்பவரின் பெயர்  :"
  proposalNum.label: "பிரேரணை இல :"
  occupation.label: "1.	உமது தொழில் என்ன? ஒன்றிற்கு மேற்பட்டிருப்பின் எல்லாவற்றையும் குறிப்பிடுக."
  dutyInvolve.label: "2.	உமது கடமைகள் சம்பந்தமான தகவல்களைத் தரவும்."
  teetotaler.label: "3.	நீர் மதுபான விரோதியா? அவ்வாறாயின் எப்போதும் மதுபான விரோதியாகவே இருந்தீரா? இல்லாவிடில் குறிப்பிடவும்."
  teetotalerDetails.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  liquorType.label: "அ. நீர் அருந்திய மதுபான வகை?"
  avgDailyIntake.label: "ஆ. தினமும் உட்கொள்ளும் சராசரி அலகுகள்,(இங்கு ஒரு அலகு என்பது ஒரு அவுன்ஸ் 'ஸ்பிரிட்' அல்லது 4 அவுன்ஸ் திராட்சை இரசம் அல்லது 10 அவுன்ஸ் பியர் பானத்தைக் குறிக்கும்)"
  health.label: "4.	நீர் மதுபானம் அருந்தியமை எப்போதாவது உமது உடல் நலத்தை அல்லது உமது வேலைத் திறனைப் பாதித்துள்ளதா?"
  smoker.label: "5.	நீர் புகைபிடிப்பவரா? அவ்வாறாயின் விவரங்களைக் குறிப்பிடவும்."
  smokerDetails.label: "විதயவுசெய்து விவரங்களை வழங்கவும்"
  changeTheNature.label: "6.	அடுத்து வரும் 12 மாதங்களுக்குள் உமது சேவையின் தன்மையை மாற்ற உத்தேசித்துள்ளீரா? அவ்வாறாயின் விவரங்களைக் குறிப்பிடவும்."
  changeTheNatureDetails.label: "தயவுசெய்து விவரங்களை வழங்கவும்"
  date.label: "திகதி :"
  signature.label: "பிரேரிப்பவரின் கையொப்பம் :"

  # Options
  dutyInvolve.options.Regular attendance at a bar: "அ. மதுபானசாலைக்கு தினமும் சமூகமளிக்க வேண்டுமா"
  dutyInvolve.options.Part time attendance at a bar: "ஆ. மதுபானசாலைக்கு பகுதி நேரம் சமூகமளிக்க வேண்டுமா"
  dutyInvolve.options.Supervisory duties only: "இ. மேற்பார்வை வேலைகள் மாத்திரமா?"
  dutyInvolve.options.A regular shift or changeable working hours: "ஈ. வேலை நேரம் நிலையானதா அல்லது மாறக்கூடியதா"
  dutyInvolve.options.Working in a brewery, distillery or winery: "உ. மதுபானம் காய்ச்சி, வடிக்கும் பகுதியிலா வேலை செய்கிறீர்"
  
  teetotaler.options.yes: "ஆம்"
  teetotaler.options.no: "இல்லை"
  
  smoker.options.yes: "ஆம்"
  smoker.options.no: "இல்லை"
  
  changeTheNature.options.yes: "ஆம்"
  changeTheNature.options.no: "இல்லை"

  # Layout Texts
  text.declare: "எனது அறிவுக்கெட்டிய வகையில் என்னால் கொடுக்கப்பட்ட விடைகள் அனைத்தும் உண்மை எனவும், இப்பிரேரணையை மதிப்பிடுவதற்கோ அல்லது ஏற்றுக் கொள்வதற்கோ தூண்டக்கூடிய எந்தவொரு மூலத்தகவல்களையும் நான் மறைக்கவில்லை எனவும் இத்தால் உறுதி கூறுகிறேன்."
  text.agree: "எனது ஆயுள் காப்புறுதி பிரேரணைக்கு இப்பத்திரம் ஒரு பகுதியாக அமையும் எனவும் இதில் எனக்குத் தெரிந்து என்னால் கொடுக்கப்படத் தவறும் எவ்வித மூலத்தகவல்களும் இவ் ஒப்பந்தத்தைச் செல்லுபடியற்றதாக்கும் என்பதற்கும் உடன்படுகின்றேன் "
  submit.button: "படிவத்தை நிரப்பவும்"
  reset.button: "படிவத் தரவை நீக்கு"
